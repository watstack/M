<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betting — Kickoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@700;800&family=DM+Sans:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Betting page layout ── */
    .bet-page { max-width: 780px; margin: 0 auto; padding: 0 16px 120px; }

    /* ── Header ── */
    .bet-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
      flex-wrap: wrap;
    }
    .bet-back {
      font-family: var(--font-pixel);
      font-size: 0.42rem;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 2px 2px 0 rgba(0,0,0,.5);
    }
    .bet-back:hover { color: var(--text); }
    .bet-title {
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      flex: 1;
      text-align: center;
    }
    .bet-balance {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,154,208,.08);
      border: 1px solid rgba(255,154,208,.25);
      border-radius: var(--radius);
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 700;
    }
    .bet-balance-num { color: var(--gold); }
    .bet-participant {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      font-weight: 700;
    }

    /* ── Fixture carousel ── */
    .bet-sticky {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--dark);
      padding-bottom: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,.7);
    }
    .fix-carousel-wrap {
      margin: 0 -16px;
      padding: 10px 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .fix-carousel {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;
      scrollbar-width: none;
    }
    .fix-carousel::-webkit-scrollbar { display: none; }
    .fix-card {
      flex-shrink: 0; width: 108px; background: var(--mid);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 10px 10px 8px; display: flex; flex-direction: column; gap: 5px;
    }
    .fix-card.live-card { border-color: var(--live-pulse); }
    .fix-card.my-card   { border-color: var(--gold); }
    .fix-card.past-card { opacity: 0.55; }
    .fix-card-teams {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 1.1rem; line-height: 1;
    }
    .fix-card-score {
      font-family: var(--font-pixel); font-size: 0.58rem; color: var(--text);
      text-align: center; letter-spacing: .05em; line-height: 1.3;
    }
    .fix-card-score.live { color: var(--live-pulse); }
    .fix-card-time {
      font-family: var(--font-mono); font-size: 0.62rem; color: var(--muted);
      text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fix-card-bet { text-align: center; font-size: 0.65rem; line-height: 1; margin-top: 1px; }

    /* ── Tab bar ── */
    .bet-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 0;
      margin-bottom: 0;
    }
    .bet-filter-row { padding: 8px 0 4px; }
    .bet-tab {
      background: var(--panel);
      border: 2px solid var(--border);
      color: var(--muted);
      font-family: var(--font-pixel);
      font-size: 0.42rem;
      padding: 8px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,.6);
    }
    .bet-tab.active { background: var(--green); border-color: var(--green); color: #0a0805; box-shadow: 2px 2px 0 rgba(0,0,0,.5); }
    .bet-tab:hover:not(.active) { color: var(--text); }

    /* ── Section heading ── */
    .bet-section-title {
      font-family: var(--font-pixel);
      font-size: 0.45rem;
      color: var(--muted);
      letter-spacing: .1em;
      margin: 24px 0 12px;
    }

    /* ── Market cards ── */
    .market-card {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: 3px 3px 0 rgba(0,0,0,.5);
      overflow: hidden;
    }
    .market-card-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 16px 10px;
    }
    .match-name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .match-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .market-top-bet {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      padding-top: 2px;
    }
    .market-top-nick { font-weight: 700; color: var(--text); }
    .market-top-payout { font-family: var(--font-mono); color: var(--gold); }

    .kickoff-time {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
    }
    .market-chip {
      font-family: var(--font-pixel);
      font-size: 0.32rem;
      padding: 4px 8px;
      border-radius: var(--radius);
    }
    .market-chip.open    { background: rgba(255,106,31,.15); border: 1px solid rgba(255,106,31,.4); color: var(--green); }
    .market-chip.closed  { background: rgba(255,59,92,.1);   border: 1px solid rgba(255,59,92,.3);  color: var(--red); }
    .market-chip.settled { background: rgba(255,154,208,.1); border: 1px solid rgba(255,154,208,.3); color: var(--gold); }
    .market-chip.locked  { background: rgba(128,112,96,.15); border: 1px solid rgba(128,112,96,.4); color: var(--muted); }

    /* ── Group / stage sub-headings ── */
    .bet-group-title {
      font-family: var(--font-pixel);
      font-size: 0.38rem;
      color: var(--green);
      letter-spacing: .08em;
      margin: 16px 0 8px;
      padding-left: 2px;
    }

    /* ── Match sort toggle ── */
    .match-sort-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .sort-opt {
      background: var(--panel);
      border: 2px solid var(--border);
      color: var(--muted);
      font-family: var(--font-pixel);
      font-size: 0.36rem;
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(0,0,0,.5);
    }
    .sort-opt.active { background: var(--green); border-color: var(--green); color: #0a0805; }
    .sort-opt:hover:not(.active) { color: var(--text); }
    #myBetsFilter { gap: 16px; margin-top: 16px; margin-bottom: 40px; }

    /* ── Team header ── */
    .match-teams {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
    }
    .team-side { display: flex; align-items: center; gap: 6px; min-width: 0; overflow: hidden; }
    .team-flag { font-size: 1.15rem; line-height: 1; flex-shrink: 0; }
    .team-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-name.tbc { color: var(--muted); font-weight: 400; font-style: italic; font-size: 0.82rem; }
    .vs { font-family: var(--font-pixel); font-size: 0.32rem; color: var(--muted); }
    .market-card.locked { opacity: .82; }
    .match-venue {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      opacity: .8;
    }

    /* ── Odds row ── */
    .match-odds-row {
      display: flex;
      gap: 8px;
      padding: 0 16px 14px;
    }
    .odds-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: var(--mid);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 8px;
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(0,0,0,.5);
      transition: transform .08s, box-shadow .08s, border-color .1s;
    }
    .odds-btn:hover:not(:disabled) { border-color: var(--green); transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(0,0,0,.5); }
    .odds-btn:disabled, .odds-btn.disabled { opacity: .45; cursor: not-allowed; }
    .odds-btn.result-winner { border-color: var(--gold); background: rgba(255,154,208,.12); }
    .odds-btn.selected { border-color: var(--green); background: rgba(255,106,31,.15); }
    .odds-label { font-family: var(--font-pixel); font-size: 0.32rem; color: var(--muted); }
    .odds-price { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: var(--text); }

    /* ── Correct score accordion ── */
    .cs-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--text);
    }
    .cs-toggle:hover { color: var(--text); }
    .cs-arrow { font-size: 0.7rem; transition: transform .15s; }
    .cs-toggle.open .cs-arrow { transform: rotate(180deg); }
    .cs-content { padding: 12px 16px 14px; border-top: 1px solid var(--border); }
    .cs-content.hidden { display: none; }
    .dc-row { display: flex; gap: 8px; padding-bottom: 12px; }
    .dc-divider { height: 1px; background: var(--border); margin: 0 0 12px; }

    /* ── Qualify (To Qualify / Draw No Bet) section ── */
    .qualify-section {
      border-top: 1px solid var(--border);
      padding: 10px 16px 14px;
    }
    .qualify-label {
      font-family: var(--font-pixel);
      font-size: 0.32rem;
      color: var(--muted);
      letter-spacing: .06em;
      margin-bottom: 8px;
    }
    .qualify-row {
      display: flex;
      gap: 8px;
    }

    .score-grid { display: flex; flex-direction: column; gap: 12px; }
    .score-section {}
    .score-label {
      font-family: var(--font-pixel);
      font-size: 0.32rem;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: .06em;
    }
    .score-btns { display: flex; flex-wrap: wrap; gap: 6px; }
    .score-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--mid);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: #f6ead8 !important;
      box-shadow: 2px 2px 0 rgba(0,0,0,.4);
      transition: transform .08s, box-shadow .08s;
    }
    .score-btn:hover:not(:disabled) { border-color: var(--gold); transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(0,0,0,.4); }
    .score-btn.selected { border-color: var(--gold); background: rgba(255,154,208,.12); }
    .score-odds { font-size: 0.7rem; color: var(--gold); }

/* ── My bets ── */
    .my-bets-list { display: flex; flex-direction: column; gap: 10px; }
    .my-bet-row {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 2px 2px 0 rgba(0,0,0,.4);
    }
    .my-bet-match { font-weight: 700; margin-bottom: 6px; font-size: 0.88rem; }
    .my-bet-detail { display: flex; gap: 12px; font-family: var(--font-mono); font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; }
    .my-bet-selection { color: var(--text); font-weight: 700; }
    .my-bet-result { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; }
    .bet-status { font-family: var(--font-pixel); font-size: 0.3rem; padding: 3px 7px; border-radius: var(--radius); }
    .bet-status.won     { background: rgba(60,176,74,.2);  border: 1px solid rgba(60,176,74,.5);  color: #3cb04a; }
    .bet-status.lost    { background: rgba(255,59,92,.1);  border: 1px solid rgba(255,59,92,.4);  color: var(--red); }
    .bet-status.pending { background: rgba(255,154,208,.08); border: 1px solid rgba(255,154,208,.25); color: var(--gold); }
    .bet-status.void    { background: rgba(128,112,96,.15); border: 1px solid rgba(128,112,96,.4); color: var(--muted); }
    .my-bet-payout { font-family: var(--font-mono); font-size: 0.85rem; }
    .my-bets-empty { color: var(--muted); text-align: center; padding: 40px 0; font-size: 0.9rem; }
    .my-bet-share-btn {
      margin-left: auto; background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.72rem; padding: 3px 9px;
      border-radius: var(--radius); cursor: pointer; flex-shrink: 0;
      box-shadow: none; transform: none;
    }
    .my-bet-share-btn:hover { color: var(--text); border-color: var(--gold); transform: none; box-shadow: none; filter: none; }

    /* ── Share bet modal ── */
    .share-bet-overlay {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
    }
    .share-bet-overlay.hidden { display: none; }
    .share-bet-card {
      background: var(--panel); border: 2px solid var(--border);
      border-radius: 16px; padding: 24px 20px 20px;
      max-width: 340px; width: 92vw;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    .share-bet-title { font-family: var(--font-pixel); font-size: 0.55rem; margin-bottom: 14px; color: var(--text); }
    .share-bet-preview { border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
    .share-bet-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .share-bet-msg {
      width: 100%; box-sizing: border-box;
      background: var(--mid); border: 2px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font-body); font-size: 0.85rem;
      padding: 8px 10px; resize: none; min-height: 56px;
      margin-bottom: 16px;
    }
    .share-bet-msg:focus { outline: none; border-color: var(--gold); }
    .share-bet-actions { display: flex; gap: 8px; }
    .share-bet-actions button { flex: 1; }

    /* ── Parlay betslip legs ── */
    .slip-legs { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
    .slip-leg {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 10px; background: var(--panel);
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    .slip-leg-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .slip-leg-label { font-size: 0.88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .slip-leg-odds { font-family: var(--font-mono); font-size: 0.78rem; color: var(--green); }
    .slip-leg-remove {
      background: none; border: none; color: var(--muted);
      font-size: 0.9rem; cursor: pointer; padding: 4px; line-height: 1; flex-shrink: 0;
    }
    .slip-leg-remove:hover { color: var(--red); }
    .slip-total-odds {
      font-family: var(--font-mono); font-size: 0.85rem; color: var(--gold);
      margin-bottom: 12px; padding: 6px 10px;
      background: rgba(255,154,208,.06); border: 1px solid rgba(255,154,208,.15);
      border-radius: var(--radius);
    }

    /* ── Parlay bets in My Bets ── */
    .parlay-bet-row { border-color: rgba(255,154,208,.35); }
    .parlay-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .parlay-label { font-family: var(--font-pixel); font-size: 0.32rem; color: var(--gold); letter-spacing: .05em; }
    .parlay-total-odds { font-family: var(--font-mono); font-size: 0.85rem; color: var(--green); font-weight: 700; }
    .parlay-legs {
      display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px;
      padding-left: 8px; border-left: 2px solid rgba(255,154,208,.25);
    }
    .parlay-leg { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; padding: 3px 0; }
    .parlay-leg-icon { font-size: 0.72rem; width: 14px; text-align: center; flex-shrink: 0; }
    .parlay-leg-icon.won     { color: #3cb04a; }
    .parlay-leg-icon.lost    { color: var(--red); }
    .parlay-leg-icon.void    { color: var(--muted); }
    .parlay-leg-icon.pending { color: var(--gold); }
    .parlay-leg-match { flex: 1; min-width: 0; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .parlay-leg-sel { font-weight: 700; flex-shrink: 0; }
    .parlay-leg-odds { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }

    /* ── All bets (community view) ── */
    .all-bets-filter {
      display: flex; flex-wrap: nowrap; gap: 8px; margin-bottom: 16px;
      overflow-x: auto; padding-bottom: 4px;
    }
    .all-bets-filter::-webkit-scrollbar { display: none; }
    .filter-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--panel); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 5px 10px; cursor: pointer;
      font-size: 0.82rem; font-weight: 700; color: var(--text);
      box-shadow: 2px 2px 0 rgba(0,0,0,.4); flex-shrink: 0;
    }
    .filter-pill.active { border-color: var(--green); background: rgba(255,106,31,.12); }
    .filter-pill:hover:not(.active) { border-color: var(--muted); }
    .all-bet-user {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .all-bet-nick { font-size: 0.82rem; font-weight: 700; color: var(--text); }
    .all-bet-dates { display: flex; gap: 20px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .all-bet-date-item { display: flex; flex-direction: column; gap: 2px; }
    .all-bet-date-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .all-bet-date-value { font-size: 0.78rem; font-family: var(--font-mono); color: var(--text); }

    /* ── Admin settle/resolve ── */
    .admin-hint { color: var(--muted); font-size: 0.82rem; margin-bottom: 14px; line-height: 1.5; }
    .admin-list { display: flex; flex-direction: column; gap: 6px; }
    .admin-row {
      display: grid;
      grid-template-columns: 84px 1fr auto;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      box-shadow: 2px 2px 0 rgba(0,0,0,.4);
    }
    .admin-meta { display: flex; flex-direction: column; gap: 2px; }
    .adm-no { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text); }
    .adm-stage { font-family: var(--font-pixel); font-size: 0.28rem; color: var(--muted); }
    .admin-name { font-size: 0.85rem; font-weight: 700; min-width: 0; }
    .adm-v { color: var(--muted); font-weight: 400; margin: 0 2px; }
    .admin-ctrls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
    .adm-in {
      background: var(--mid); border: 2px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--font-mono); font-size: 0.82rem; padding: 5px 6px;
    }
    .adm-in:focus { border-color: var(--green); outline: none; }
    .adm-score { width: 38px; text-align: center; }
    .adm-code  { width: 56px; text-transform: uppercase; }
    .adm-win   { font-size: 0.7rem; padding: 5px 4px; }
    .adm-dash  { color: var(--muted); }
    .adm-btn {
      background: var(--green); border: none; border-radius: var(--radius);
      color: #0a0805; font-family: var(--font-pixel); font-size: 0.32rem;
      padding: 7px 10px; cursor: pointer; box-shadow: 2px 2px 0 rgba(0,0,0,.5);
    }
    .adm-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(0,0,0,.5); }
    .adm-settled { font-family: var(--font-pixel); font-size: 0.3rem; color: #3cb04a; }
    @media (max-width: 560px) {
      .admin-row { grid-template-columns: 1fr; gap: 6px; }
      .admin-ctrls { justify-content: flex-start; }
    }

    /* ── Leaderboard: cans ── */
    .lb-cans { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); white-space: nowrap; margin-left: 4px; }
    .lb-pot  { font-family: var(--font-pixel); font-size: 0.38rem; color: var(--gold); letter-spacing: .06em; padding: 10px 16px 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

    /* ── Pot hero banner ── */
    .pot-hero {
      height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
      background: linear-gradient(160deg, #1c0800 0%, #2e1100 45%, #1c0800 100%);
      border: 2px solid var(--green);
      border-radius: var(--radius);
      box-shadow: 0 0 0 1px rgba(255,106,31,.18), 3px 3px 0 #000, 0 0 28px rgba(255,106,31,.12);
      text-align: center;
      overflow: hidden;
    }
    .pot-hero-label {
      font-family: var(--font-pixel);
      font-size: 14px;
      color: #fff;
      letter-spacing: .14em;
    }
    .pot-hero-amount {
      font-family: var(--font-pixel);
      font-size: 0.68rem;
      color: var(--green);
      letter-spacing: .06em;
      text-shadow: 0 0 12px rgba(255,106,31,.55), 2px 2px 0 #000;
    }
    .pot-hero-deco {
      font-family: var(--font-pixel);
      font-size: 0.22rem;
      color: rgba(255,106,31,.25);
      letter-spacing: .04em;
    }

    /* ── Admin: participants section ── */
    .adm-participants-title { font-family: var(--font-pixel); font-size: 0.38rem; color: var(--muted); letter-spacing: .08em; margin: 24px 0 10px; }
    .adm-participants-list  { display: flex; flex-direction: column; gap: 6px; }
    .adm-p-row { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 8px; background: var(--panel); border: 2px solid var(--border); border-radius: var(--radius); padding: 8px 12px; }
    .adm-p-name { font-size: 0.85rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .adm-p-label { font-family: var(--font-pixel); font-size: 0.26rem; color: var(--muted); display: block; margin-bottom: 2px; }
    @media (max-width: 560px) { .adm-p-row { grid-template-columns: 1fr 1fr; } .adm-p-row .adm-btn { grid-column: 1 / -1; } }

    /* ── Admin accordions ── */
    .adm-accordion { border: 2px solid var(--border); border-radius: var(--radius); background: var(--panel); box-shadow: 2px 2px 0 rgba(0,0,0,.4); overflow: hidden; margin-bottom: 8px; }
    .adm-acc-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; user-select: none; }
    .adm-acc-toggle:hover { background: rgba(255,255,255,.03); }
    .adm-acc-title { font-family: var(--font-pixel); font-size: 0.38rem; color: var(--muted); letter-spacing: .08em; }
    .adm-acc-arrow { font-size: 0.7rem; transition: transform .15s; color: var(--muted); }
    .adm-acc-toggle.open .adm-acc-arrow { transform: rotate(180deg); }
    .adm-acc-content { padding: 10px 12px 12px; border-top: 1px solid var(--border); }
    .adm-acc-content.hidden { display: none; }

    /* ── Promo carousel (Two Up + Request-a-Bet) ── */
    .promo-carousel { margin: 0 -16px 16px; overflow: hidden; position: relative; }
    .promo-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      align-items: stretch;
    }
    .promo-track::-webkit-scrollbar { display: none; }
    .promo-slide {
      flex-shrink: 0;
      width: 100%;
      scroll-snap-align: start;
      padding: 0 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .promo-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 6px 0 4px;
    }
    .promo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background .15s; display: inline-block; }
    .promo-dot.active { background: var(--green); }
    .promo-arrow {
      background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer;
      padding: 2px 8px; line-height: 1;
    }
    .promo-arrow:hover { color: var(--text); }

    /* ── Two Up hero card ── */
    .tu-hero {
      flex: 1;
      display: flex; flex-direction: column;
      background: var(--panel);
      border: 2px solid rgba(104,136,200,.4);
      border-radius: var(--radius);
      box-shadow: 3px 3px 0 rgba(0,0,0,.5);
      overflow: hidden;
    }
    .tu-hero-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
      padding: 14px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .tu-hero-title {
      font-family: var(--font-pixel); font-size: 0.68rem;
      color: var(--pixel-sky); letter-spacing: .06em; line-height: 1.5;
    }
    .tu-hero-sub { font-family: var(--font-body); font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
    .tu-hero-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px; gap: 14px; overflow: hidden;
    }
    .tu-cd-label-hero { font-family: var(--font-body); font-size: 0.88rem; color: var(--muted); }
    .tu-cd-blocks { display: flex; gap: 8px; align-items: flex-start; justify-content: center; }
    .tu-cd-block { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .tu-cd-num {
      font-family: var(--font-mono); font-weight: 700;
      font-size: clamp(2rem, 9vw, 3.5rem);
      color: var(--text); background: var(--mid);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 10px 8px; min-width: clamp(56px, 17vw, 80px);
      text-align: center; line-height: 1; font-variant-numeric: tabular-nums;
      box-shadow: 2px 2px 0 rgba(0,0,0,.5);
    }
    .tu-cd-unit {
      font-family: var(--font-body); font-size: 0.55rem;
      color: var(--muted); text-transform: uppercase; letter-spacing: .12em;
    }
    .tu-hero-foot {
      flex-shrink: 0; padding: 10px 16px 14px; border-top: 1px solid var(--border);
    }
    .tu-coin-area { display: flex; justify-content: center; align-items: center; gap: 20px; padding: 12px 0 8px; }
    .tu-coin {
      width: 60px; height: 60px; border-radius: 50%;
      border: 3px solid var(--pixel-sand);
      background: var(--mid);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-pixel); font-size: 0.65rem; color: var(--pixel-sand);
      box-shadow: 2px 2px 0 rgba(0,0,0,.5);
      perspective: 400px;
    }
    .tu-coin-hh { border-color: var(--pixel-sky); color: var(--pixel-sky); }
    .tu-coin-tt { border-color: var(--red); color: var(--red); }
    .tu-coin--spinning { animation: tuCoinFlip 0.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .tu-coin--spinning:last-child { animation-delay: 150ms; }
    @keyframes tuCoinFlip {
      0%   { transform: rotateY(0deg) rotateX(0deg); }
      100% { transform: rotateY(1080deg) rotateX(360deg); }
    }
    .tu-coin-pending { opacity: 0.4; }
    .tu-vs { font-family: var(--font-pixel); font-size: 0.45rem; color: var(--muted); }
    .tu-result { text-align: center; padding: 6px 16px 4px; font-family: var(--font-pixel); font-size: 0.6rem; }
    .tu-result--heads { color: var(--pixel-sky); }
    .tu-result--tails { color: var(--red); }
    .tu-result--odd   { color: var(--gold); }
    .tu-result-sub { font-family: var(--font-body); font-size: 0.72rem; color: var(--muted); text-align: center; padding-bottom: 4px; }
    .tu-pot { padding: 10px 16px; border-top: 1px solid var(--border); }
    .tu-pot-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-family: var(--font-mono); font-size: 0.88rem; margin-bottom: 4px; }
    .tu-pot-total { font-family: var(--font-body); font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .tu-heads-val { color: var(--pixel-sky); font-weight: 700; }
    .tu-tails-val { color: var(--red); font-weight: 700; }
    .tu-pot-divider { color: var(--border); }
    .tu-actions { padding: 10px 16px 14px; }
    .tu-carousel-nav { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px 2px; border-top: 1px solid var(--border); }
    .tu-carousel-label { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); }
    .tu-carousel-arrows { display: flex; gap: 8px; }
    .tu-carousel-btn {
      background: var(--mid); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--muted); font-size: 0.8rem; padding: 3px 8px; cursor: pointer; line-height: 1;
    }
    .tu-carousel-btn:hover { color: var(--text); border-color: var(--green); }
    .tu-carousel-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .tu-rollover-badge {
      display: inline-block; font-family: var(--font-mono); font-size: 0.65rem;
      color: var(--gold); background: rgba(255,154,208,.1);
      border: 1px solid rgba(255,154,208,.3); border-radius: 20px;
      padding: 2px 8px; margin-left: 6px;
    }

    /* ── Two Up bet dialog ── */
    .tu-bet-overlay {
      position: fixed; inset: 0; z-index: 850;
      background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
    }
    .tu-bet-overlay.hidden { display: none; }
    .tu-bet-card {
      background: var(--panel); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      max-width: 340px; width: 92vw;
      box-shadow: 3px 3px 0 rgba(0,0,0,.6);
    }
    .tu-bet-title {
      font-family: var(--font-pixel); font-size: 0.5rem; color: var(--text);
      margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .tu-outcome-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tu-outcome-tab {
      flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--mid); color: var(--muted); font-family: var(--font-mono);
      font-size: 0.85rem; font-weight: 700; cursor: pointer; text-align: center;
      transition: border-color .1s, color .1s;
    }
    .tu-outcome-tab.active-heads { border-color: var(--pixel-sky); color: var(--pixel-sky); background: rgba(104,136,200,.12); }
    .tu-outcome-tab.active-tails { border-color: var(--red); color: var(--red); background: rgba(255,59,92,.1); }
    .tu-bet-label { font-family: var(--font-body); font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .tu-bet-amount { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .tu-bet-amount .adm-in { flex: 1; font-family: var(--font-mono); font-size: 1rem; }
    .tu-bet-error { font-family: var(--font-body); font-size: 0.75rem; color: var(--red); min-height: 18px; margin-bottom: 8px; }
    .tu-bet-actions { display: flex; gap: 8px; margin-top: 4px; }
    .tu-bet-actions button { flex: 1; }

    /* ── Two Up how-to-play & rules ── */
    .tu-how-to-play-foot {
      padding: 10px 16px 14px; text-align: center; border-top: 1px solid var(--border);
    }
    .tu-how-to-play-row { text-align: right; margin-bottom: 12px; margin-top: -6px; }
    .tu-rules-link {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--muted); text-decoration: underline dotted; padding: 0;
    }
    .tu-rules-link:hover { color: var(--text); }
    .tu-cd-next {
      font-family: var(--font-body); font-size: 0.72rem; color: var(--muted); text-align: center;
    }
    .tu-rules-card { max-width: 360px; }
    .tu-rules-list {
      list-style: none; padding: 0; margin: 0 0 4px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .tu-rules-list li {
      font-family: var(--font-body); font-size: 0.85rem; color: var(--text);
      padding: 6px 10px; background: var(--mid); border-radius: var(--radius);
      border-left: 3px solid var(--border);
    }
    .tu-rules-list li b { color: var(--pixel-sky); }

    /* ── Request-a-Bet card ── */
    .req-bet-card { border-color: rgba(255,106,31,.35); }
    .req-bet-collapsed { padding: 0 16px 14px; }
    .req-bet-expanded { padding: 10px 16px 14px; border-top: 1px solid var(--border); }
    .req-bet-input-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    .req-bet-input {
      flex: 1; min-width: 180px; background: var(--mid); border: 2px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: var(--font-body);
      font-size: 0.9rem; padding: 8px 10px;
    }
    .req-bet-input:focus { border-color: var(--green); outline: none; }
    .req-bet-hint { font-size: 0.75rem; color: var(--muted); font-family: var(--font-mono); }
    .req-opt-row { display:flex; gap:6px; align-items:center; margin-bottom:5px; }
    .req-opt-label { flex:1; min-width:80px; }
    .req-opt-odds  { width:72px; }

    /* ── Bet slip (bottom drawer) ── */
    .bet-slip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--mid);
      border-top: 2px solid var(--border);
      box-shadow: 0 -4px 24px rgba(0,0,0,.6);
      padding: 12px 16px 14px;
      z-index: 200;
      max-width: 780px;
      margin: 0 auto;
      transition: transform .22s var(--ease);
    }
    .bet-slip.hidden { transform: translateY(110%); }
    .bet-slip-title {
      font-family: var(--font-pixel);
      font-size: 0.4rem;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bet-slip-selection {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .bet-slip-odds {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--green);
      margin-bottom: 14px;
    }
    .close-slip-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
    }
    .stake-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .preset-btn {
      background: var(--panel);
      border: 2px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(0,0,0,.4);
    }
    .preset-btn:hover { border-color: var(--green); }
    .stake-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .stake-label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
    .stake-input {
      flex: 1;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 1rem;
      padding: 8px 12px;
      max-width: 140px;
    }
    .stake-input:focus { border-color: var(--green); outline: none; }
    .payout-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    .payout-label { color: var(--muted); }
    .payout-amount { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: var(--gold); }
    .place-btn {
      width: 100%;
      padding: 11px;
      background: var(--green);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-pixel);
      font-size: 0.52rem;
      color: #0a0805;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,.6);
      transition: transform .08s, box-shadow .08s;
    }
    .place-btn:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 rgba(0,0,0,.6); }
    .place-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Boost toggle ── */
    .boost-toggle {
      margin: 0 0 12px;
      padding: 10px 12px;
      background: rgba(255,106,31,.05);
      border: 1px solid rgba(255,106,31,.22);
      border-radius: var(--radius);
    }
    .boost-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .boost-btn {
      flex: 1;
      background: var(--panel);
      border: 2px solid var(--green);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 7px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      transition: border-color .12s, background .12s, color .12s;
    }
    .boost-btn:hover:not(:disabled) { background: rgba(255,106,31,.1); }
    .boost-btn--on {
      background: rgba(255,154,208,.1);
      border-color: var(--gold);
      color: var(--gold);
    }
    .boost-btn:disabled {
      opacity: .48;
      cursor: not-allowed;
      border-color: var(--border);
    }
    .boost-badge {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .boost-badge--available { background: rgba(255,106,31,.14); color: var(--green); border: 1px solid var(--green); }
    .boost-badge--empty     { background: rgba(181,138,160,.08); color: var(--muted); border: 1px solid var(--border); }
    .boost-badge--urgent    { background: rgba(255,200,50,.1); color: #ffc832; border: 1px solid #ffc832; }
    .boost-odds-display {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      color: var(--gold);
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid rgba(255,106,31,.15);
    }
    .boost-hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .boost-hint.hidden { display: none; }

    /* ── Betslip accordion collapse ── */
    .slip-body {
      overflow: hidden;
      max-height: 600px;
      opacity: 1;
      transition: max-height .3s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity .25s ease;
    }
    .bet-slip.collapsed .slip-body { max-height: 0; opacity: 0; }
    .bet-slip-title-left { display: flex; align-items: center; flex: 1; min-width: 0; gap: 6px; }
    .bet-slip-title-right { display: flex; align-items: center; gap: 8px; }
    #slipTitle { font-size: 16px; color: var(--text); }
    .slip-collapsed-summary {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transition: opacity .2s ease .05s;
    }
    .bet-slip.collapsed .slip-collapsed-summary { opacity: 1; }
    .slip-collapse-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer; padding: 4px; line-height: 1;
    }
    .slip-collapse-btn:hover { color: var(--text); }
    .slip-chevron {
      display: inline-block;
      transition: transform .28s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.7rem;
    }
    .bet-slip.collapsed .slip-chevron { transform: rotate(180deg); }

    /* ── Betslip collapsed peek panel ── */
    .slip-peek {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .3s cubic-bezier(0.4, 0, 0.2, 1), opacity .2s ease;
    }
    .bet-slip.collapsed .slip-peek { max-height: 120px; opacity: 1; }
    .slip-peek-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0 8px;
    }
    .slip-peek-return {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: -0.02em;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .slip-peek-stake-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .slip-peek-label { font-size: 0.78rem; color: var(--muted); }
    .slip-peek-stake {
      width: 72px;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 5px 8px;
    }
    .slip-peek-stake:focus { border-color: var(--green); outline: none; }

    /* ── Parlay Pump promo card ── */
    .pp-card {
      flex: 1; display: flex; flex-direction: column;
      background: var(--panel);
      border: 2px solid rgba(251,191,36,.4);
      border-radius: var(--radius);
      box-shadow: 3px 3px 0 rgba(0,0,0,.5);
      overflow: hidden;
    }
    .pp-card-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
      padding: 14px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .pp-card-title {
      font-family: var(--font-pixel); font-size: 0.68rem;
      color: var(--text); line-height: 1.4; letter-spacing: .02em;
    }
    .pp-card-sub { font-family: var(--font-body); font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
    .pp-card-body {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 18px 16px 14px; gap: 4px;
    }
    .pp-card-boost {
      font-family: var(--font-pixel); font-size: clamp(1.6rem, 7vw, 2.4rem);
      color: #fbbf24; letter-spacing: .04em;
      text-shadow: 3px 3px 0 rgba(0,0,0,.6);
    }
    .pp-card-desc { font-family: var(--font-body); font-size: 0.78rem; color: var(--muted); }
    .pp-card-example {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      margin-top: 10px; padding: 8px 16px; border-radius: var(--radius);
      background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.2);
    }

<script>
// ── Init ──────────────────────────────────────────────────────────────────────
let db = null;
let _tournament = null;
let _participant = null;
let _parlayLegs = []; // [{marketId, selection, odds, matchName, label}]
let _currentTab = 'markets';
let _matchSort = 'upcoming';
let _balanceSub = null;
let _marketsByNo = {};
let _customMarkets = [];
let _allBets = [];
let _allBetsFilterPid = null;
let _allBetsParticipants = [];
let _myBets = [];
let _myBetsFilterStatus = null;
let _teamSet = new Set();
let _pendingByMatchNo = {};
let _matchesByKey = {};
let _carouselInitScrollDone = false;
let _boostState = { remaining: 2, resetAt: null, active: false, timerId: null };

try {
  if (typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_URL && window.supabase) {
    db = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  }
} catch(e) { console.error('Supabase init:', e); }

const params = new URLSearchParams(location.search);
const code   = (params.get('code') || '').toUpperCase();

if (!code) {
  document.querySelector('.bet-page').innerHTML = '<p style="padding:48px;text-align:center;color:var(--muted)">No tournament code. <a href="index.html">Go home</a></p>';
}

const _me = location.hash.match(/me=([0-9a-fA-F-]+)/);
 if (code && _me) {
   localStorage.setItem(`wc26_${code}`, _me[1]);
   history.replaceState(null, '', location.pathname + location.search);
 }

async function init() {
  if (!code || !db) return;

  document.getElementById('backLink').href = `sweepstake.html?code=${code}`;

  // Load tournament
  const { data: tourn, error: tErr } = await db.from('tournaments').select('*').eq('code', code).single();
  if (tErr || !tourn) {
    showToast('Tournament not found');
    return;
  }
  _tournament = tourn;

  // Load participant from session
  const pid = localStorage.getItem(`wc26_${code}`);
  if (!pid) {
    document.querySelector('.bet-page').innerHTML = `<div style="padding:60px;text-align:center">
      <p style="color:var(--muted);margin-bottom:16px">You're not in this sweepstake.</p>
      <a href="sweepstake.html?code=${code}" class="btn">Join first</a>
    </div>`;
    return;
  }
  const { data: part } = await db.from('participants').select('*').eq('id', pid).single();
  if (!part) return;
  _participant = part;
  initBoosts();
  maybeShowSpinPromo();

  // Render header
  document.getElementById('avatarImg').innerHTML = renderAvatar(part.avatar_type, null, 28);
  document.getElementById('nicknameTxt').textContent = part.nickname;
  document.getElementById('balanceAmt').textContent = part.coin_balance.toLocaleString();

  // Subscribe to balance changes
  _balanceSub = db.channel(`bet-balance:${pid}`)
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'participants', filter: `id=eq.${pid}` },
      p => {
        _participant.coin_balance = p.new.coin_balance;
        document.getElementById('balanceAmt').textContent = p.new.coin_balance.toLocaleString();
      })
    .subscribe();

  // Fire sync in background while loading user-specific data so wc_matches
  // has fresh scores/status by the time we read it.
  const _syncP = fetch('/api/sync').catch(() => {});

  // Load user's team allocations and pending bets
  const [allocRes, pendingCarouselRes] = await Promise.all([
    db.from('allocations').select('team_code')
      .eq('tournament_id', _tournament.id).eq('participant_id', _participant.id),
    db.from('bets').select('bet_markets(match_no)')
      .eq('tournament_id', _tournament.id).eq('participant_id', _participant.id)
      .eq('status', 'pending'),
  ]);

  // Wait for sync (up to 3s) then read fresh match data
  await Promise.race([_syncP, new Promise(r => setTimeout(r, 3000))]);
  const matchesCarouselRes = await db.from('wc_matches').select('home_tla, away_tla, home_score, away_score, status').order('synced_at', { ascending: false });
  _teamSet = new Set((allocRes.data || []).map(a => a.team_code));
  _pendingByMatchNo = {};
  for (const b of (pendingCarouselRes.data || [])) {
    const mn = b.bet_markets?.match_no;
    if (mn) _pendingByMatchNo[mn] = b;
  }
  _matchesByKey = {};
  for (const m of (matchesCarouselRes.data || [])) {
    const ht = m.home_tla, at = m.away_tla;
    if (ht && at) {
      const key = `${ht}_${at}`;
      if (!_matchesByKey[key]) _matchesByKey[key] = { // most recent (synced_at DESC) wins
        home_score: m.home_score,
        away_score: m.away_score,
        status: m.status,
      };
    }
  }
  renderBetCarousel();

  initBettingLeaderboard();
  startPolling(data => {
    _matchesByKey = {};
    for (const m of (data.matches || [])) {
      const ht = m.homeTeam?.tla, at = m.awayTeam?.tla;
      if (ht && at) _matchesByKey[`${ht}_${at}`] = {
        home_score: m.score?.fullTime?.home ?? null,
        away_score: m.score?.fullTime?.away ?? null,
        status: m.status,
      };
    }
    renderBetCarousel();
  });

  await loadMarketsView();
}

// ── Fixture carousel ──────────────────────────────────────────────────────────

// Knockout slots ("Winner Match 74") only resolve to real team codes once a
// draw/bracket advance happens; that resolution lands in bet_markets
// (match_result.home_code/away_code), never in the static WC2026_FIXTURES
// scaffold, so overlay it for the carousel — same as renderMatchCard does.
function codesFromMarketsByNo(marketsByNo) {
  const codesByMatchNo = {};
  for (const matchNo in (marketsByNo || {})) {
    const mr = marketsByNo[matchNo].match_result;
    if (mr && (mr.home_code || mr.away_code)) {
      codesByMatchNo[matchNo] = { home_code: mr.home_code, away_code: mr.away_code };
    }
  }
  return codesByMatchNo;
}

function renderBetCarousel() {
  const el = document.getElementById('betFixCarousel');
  if (!el) return;
  if (!(window.WC2026_FIXTURES || []).length) { el.innerHTML = ''; return; }

  const savedScroll = el.scrollLeft;
  el.innerHTML = window.FixtureCarousel.buildCarouselCards({
    matchesByKey: _matchesByKey,
    teamSet: _teamSet,
    pendingByMatchNo: _pendingByMatchNo,
    codesByMatchNo: codesFromMarketsByNo(_marketsByNo),
  }).join('');

  if (!_carouselInitScrollDone) {
    _carouselInitScrollDone = true;
    const firstCurrent = el.querySelector('.fix-card:not(.past-card)');
    if (firstCurrent) {
      requestAnimationFrame(() => { el.scrollLeft = firstCurrent.offsetLeft; });
    }
  } else {
    el.scrollLeft = savedScroll;
  }
}

async function loadMarketsView() {
  document.getElementById('marketsLoading').style.display = 'block';
  document.getElementById('matchList').style.display = 'none';
  document.getElementById('noMatchMsg').style.display = 'none';

  // Server creates/refreshes all markets + odds for this tournament (24h cache),
  // deterministically from the static WC2026_FIXTURES list. Best-effort: even if
  // it fails, the page still renders the full static scaffold below.
  try {
    const r = await fetch(`/api/markets?code=${encodeURIComponent(code)}`, { method: 'POST' });
    if (!r.ok) console.warn('[markets] /api/markets returned', r.status);
  } catch (e) {
    console.warn('[markets] /api/markets failed:', e.message);
  }

  // Read live market rows (odds/status) — non-fatal: the page renders the full
  // static scaffold regardless, with markets overlaid when present.
  let markets = [];
  try {
    markets = await loadOpenMarkets(_tournament.id);
  } catch (e) {
    console.warn('[markets] read failed, showing static scaffold only:', e.message);
  }

  // Attach bet count + total stake to each custom market
  const customIds = markets.filter(m => m.market_type === 'custom').map(m => m.id);
  if (customIds.length) {
    try {
      const stats = await loadCustomMarketBetStats(_tournament.id, customIds);
      markets = markets.map(m =>
        m.market_type === 'custom' ? { ...m, _betStats: stats[m.id] || null } : m
      );
    } catch (e) {
      console.warn('[markets] custom bet stats failed:', e.message);
    }
  }

  try {
    const topBets = await loadTopBetsByMarket(_tournament.id);
    markets = markets.map(m => ({ ...m, _topBet: topBets[m.id] || null }));
  } catch (e) {
    console.warn('[markets] top bets load failed:', e.message);
  }

  renderMarketsView(markets);
}

// ── Odds Boost ───────────────────────────────────────────────────────────────

function _boostKey() { return `wc26_boosts_${_participant?.id}`; }

function getNextMidnightUTC() {
  const n = new Date();
  return new Date(Date.UTC(n.getUTCFullYear(), n.getUTCMonth(), n.getUTCDate() + 1));
}

function initBoosts() {
  const raw = localStorage.getItem(_boostKey());
  if (raw) {
    const saved = JSON.parse(raw);
    if (Date.now() >= new Date(saved.resetAt).getTime()) {
      _boostState.remaining = 2;
      _boostState.resetAt = getNextMidnightUTC();
    } else {
      _boostState.remaining = saved.remaining;
      _boostState.resetAt = new Date(saved.resetAt);
    }
  } else {
    _boostState.remaining = 2;
    _boostState.resetAt = getNextMidnightUTC();
  }
  _boostState.active = false;
  saveBoosts();
}

function saveBoosts() {
  localStorage.setItem(_boostKey(), JSON.stringify({
    remaining: _boostState.remaining,
    resetAt: _boostState.resetAt instanceof Date
      ? _boostState.resetAt.toISOString()
      : _boostState.resetAt,
  }));
}

function applyBoostCalc(odds) {
  return Math.round(odds * 1.25 * 100) / 100;
}

function getBoostResetInfo() {
  if (!_boostState.resetAt) return { display: '', urgent: false };
  const msLeft = new Date(_boostState.resetAt).getTime() - Date.now();
  if (msLeft <= 0) return { display: 'Resetting…', urgent: false };
  const totalMins = Math.ceil(msLeft / 60000);
  const hours = Math.floor(totalMins / 60);
  const mins = totalMins % 60;
  const display = hours > 0 ? `Resets in ${hours}h ${mins}m` : `Resets in ${mins}m`;
  return { display, urgent: hours < 1 };
}

function toggleBoost() {
  if (_boostState.remaining <= 0 || _parlayLegs.length !== 1) return;
  _boostState.active = !_boostState.active;
  updateBoostUI();
  updatePayout();
}

function updateBoostUI() {
  const el = document.getElementById('boostToggle');
  if (!el) return;
  if (_parlayLegs.length !== 1) { el.style.display = 'none'; return; }
  el.style.display = '';

  const btn    = document.getElementById('boostBtn');
  const badge  = document.getElementById('boostBadge');
  const hint   = document.getElementById('boostHint');
  const oddsEl = document.getElementById('boostOddsDisplay');

  if (_boostState.remaining > 0) {
    btn.disabled = false;
    btn.className = 'boost-btn' + (_boostState.active ? ' boost-btn--on' : '');
    btn.textContent = '⚡ Boost Odds (+25%)';
    badge.textContent = `Boosts left: ${_boostState.remaining}/2`;
    badge.className = 'boost-badge boost-badge--available';
    hint.classList.add('hidden');
    if (_boostState.active) {
      const orig = _parlayLegs[0].odds;
      oddsEl.textContent = `Boosted odds: ${applyBoostCalc(orig).toFixed(2)}x (was ${orig.toFixed(2)}x)`;
      oddsEl.style.display = '';
    } else {
      oddsEl.style.display = 'none';
    }
  } else {
    btn.disabled = true;
    btn.className = 'boost-btn';
    btn.textContent = '⚡ Boosts Used';
    const { display, urgent } = getBoostResetInfo();
    badge.textContent = display;
    badge.className = 'boost-badge boost-badge--' + (urgent ? 'urgent' : 'empty');
    hint.textContent = 'Come back when the timer resets for 2 new boosts';
    hint.classList.remove('hidden');
    oddsEl.style.display = 'none';
    startBoostTimer();
  }
}

function startBoostTimer() {
  if (_boostState.timerId) return;
  _boostState.timerId = setInterval(() => {
    if (_boostState.resetAt && Date.now() >= new Date(_boostState.resetAt).getTime()) {
      _boostState.remaining = 2;
      _boostState.resetAt = getNextMidnightUTC();
      saveBoosts();
      clearInterval(_boostState.timerId);
      _boostState.timerId = null;
    }
    updateBoostUI();
  }, 60000);
}

// ── Bet slip ──────────────────────────────────────────────────────────────────

function calcTotalOdds() {
  return _parlayLegs.reduce((acc, l) => acc * l.odds, 1);
}

function renderBetSlip() {
  const n = _parlayLegs.length;
  const isMulti = n > 1;

  document.getElementById('slipTitle').textContent =
    isMulti ? `Multi (${n} legs)` : 'Bet Slip';

  document.getElementById('slipLegs').innerHTML = _parlayLegs.map((leg, idx) =>
    `<div class="slip-leg">
      <div class="slip-leg-info">
        <span class="slip-leg-label">${escapeHtml(leg.label)}</span>
        <span class="slip-leg-odds">${leg.odds}x</span>
      </div>
      <button class="slip-leg-remove" onclick="removeLeg(${idx})" aria-label="Remove">✕</button>
    </div>`
  ).join('');

  const totalOddsEl = document.getElementById('slipTotalOdds');
  if (isMulti) {
    totalOddsEl.textContent = `Total odds: ${calcTotalOdds().toFixed(2)}x`;
    totalOddsEl.style.display = 'block';
  } else {
    totalOddsEl.style.display = 'none';
  }
  if (_parlayLegs.length !== 1) _boostState.active = false;
  updateBoostUI();
  updatePayout();
  updateSlipSummary();
  updateParlayPumpSlip();
}

function selectBet(btn) {
  const marketId   = btn.dataset.marketId;
  const selection  = btn.dataset.selection;
  const odds       = parseFloat(btn.dataset.odds);
  const matchNo    = btn.dataset.matchNo || '';
  const marketType = btn.dataset.marketType || '';
  const marketCard = btn.closest('.market-card');
  const matchName  = marketCard?.querySelector('.match-name')?.textContent?.trim() || '';
  const label      = labelForSelection(selection, matchName, marketType);

  // Block correlated same-match legs (match_result / correct_score / double_chance)
  if (matchNo && marketType) {
    const CORRELATED = ['match_result', 'correct_score', 'double_chance'];
    const conflict = _parlayLegs.find(l =>
      l.matchNo === matchNo &&
      CORRELATED.includes(marketType) &&
      CORRELATED.includes(l.marketType) &&
      (l.marketType !== marketType || marketType === 'double_chance')
    );
    if (conflict) {
      showToast('nice try you cheeky bastard.\n\non ya bike 🚲');
      return;
    }
  }

  const idx = _parlayLegs.findIndex(l => l.marketId === marketId);
  if (idx >= 0) {
    const existing = _parlayLegs[idx];
    // Deselect previous button for this market
    document.querySelectorAll(
      `.odds-btn[data-market-id="${marketId}"][data-selection="${existing.selection}"],` +
      `.score-btn[data-market-id="${marketId}"][data-selection="${existing.selection}"]`
    ).forEach(b => b.classList.remove('selected'));

    if (existing.selection === selection) {
      // Same button clicked again: toggle off
      _parlayLegs.splice(idx, 1);
    } else {
      // Different selection for same market: replace
      btn.classList.add('selected');
      _parlayLegs[idx] = { marketId, selection, odds, matchName, label, matchNo, marketType };
    }
  } else {
    btn.classList.add('selected');
    _parlayLegs.push({ marketId, selection, odds, matchName, label, matchNo, marketType });
  }

  if (_parlayLegs.length === 0) {
    closeBetSlip();
  } else {
    const slip = document.getElementById('betSlip');
    const wasHidden = slip.classList.contains('hidden');
    renderBetSlip();
    slip.classList.remove('hidden');
    if (wasHidden) slip.classList.remove('collapsed');
  }
}

function removeLeg(idx) {
  const leg = _parlayLegs[idx];
  if (!leg) return;
  document.querySelectorAll(
    `.odds-btn[data-market-id="${leg.marketId}"][data-selection="${leg.selection}"],` +
    `.score-btn[data-market-id="${leg.marketId}"][data-selection="${leg.selection}"]`
  ).forEach(b => b.classList.remove('selected'));
  _parlayLegs.splice(idx, 1);
  if (_parlayLegs.length === 0) {
    document.getElementById('betSlip').classList.add('hidden');
  } else {
    renderBetSlip();
  }
}

function labelForSelection(sel, matchName, marketType) {
  if (marketType === 'first_scorer') return `${sel} to Score First — ${matchName}`;
  if (sel === 'yes') return `Yes — ${matchName}`;
  if (sel === 'no')  return `No — ${matchName}`;
  if (sel === 'home') return `${matchName.split(' vs ')[0]?.trim()} to Win`;
  if (sel === 'away') return `${matchName.split(' vs ')[1]?.trim()} to Win`;
  if (sel === 'draw') return `Draw — ${matchName}`;
  if (/^\d+-\d+$/.test(sel)) return `Correct Score: ${sel} — ${matchName.split(' vs ').map(s => s.trim()).join(' v ')}`;
  const [h, a] = matchName.split(' vs ').map(s => s.trim());
  if (sel === '1x') return `${h} or Draw`;
  if (sel === 'x2') return `Draw or ${a}`;
  if (sel === '12') return `${h} or ${a}`;
  return `${sel} — Tournament Winner`;
}

function closeBetSlip() {
  const slip = document.getElementById('betSlip');
  slip.classList.add('hidden');
  slip.classList.remove('collapsed');
  _parlayLegs.forEach(leg => {
    document.querySelectorAll(
      `.odds-btn[data-market-id="${leg.marketId}"][data-selection="${leg.selection}"],` +
      `.score-btn[data-market-id="${leg.marketId}"][data-selection="${leg.selection}"]`
    ).forEach(b => b.classList.remove('selected'));
  });
  _parlayLegs = [];
}

function toggleBetSlipCollapse() {
  document.getElementById('betSlip').classList.toggle('collapsed');
}

function collapseBetSlip() {
  document.getElementById('betSlip').classList.add('collapsed');
}

function updateSlipSummary() {
  const n = _parlayLegs.length;
  if (!n) return;
  const stake = parseInt(document.getElementById('stakeInput').value, 10) || 0;
  let totalOdds = calcTotalOdds();
  if (_boostState.active && n === 1) totalOdds = applyBoostCalc(totalOdds);
  if (_ppIsActive() && n >= 3 && !_ppHasCustomLeg()) totalOdds *= 1.35;
  const payout = stake ? Math.round(stake * totalOdds) : 0;
  document.getElementById('slipPeekReturn').textContent = payout ? `${payout.toLocaleString()} 🪙` : '—';
  document.getElementById('stakeInputPeek').value = stake || '';
}

function updatePayout() {
  const stake = parseInt(document.getElementById('stakeInput').value, 10) || 0;
  const n = _parlayLegs.length;
  let totalOdds = n > 0 ? calcTotalOdds() : 0;
  if (_boostState.active && n === 1 && totalOdds > 0) {
    totalOdds = applyBoostCalc(totalOdds);
  }
  if (_ppIsActive() && n >= 3 && !_ppHasCustomLeg() && totalOdds > 0) totalOdds *= 1.35;
  const payout = totalOdds ? Math.round(stake * totalOdds) : 0;
  document.getElementById('payoutAmt').textContent = payout ? `${payout.toLocaleString()} 🪙` : '—';
  updateSlipSummary();
}

function setStake(amount) {
  document.getElementById('stakeInput').value = amount;
  updatePayout();
}

function syncPeekStake(val) {
  document.getElementById('stakeInput').value = val;
  updatePayout();
}

function setStakeAllIn() {
  const bal = _participant?.coin_balance || 0;
  setStake(bal);
}

async function confirmBet() {
  if (_parlayLegs.length === 0) return;
  const stake = parseInt(document.getElementById('stakeInput').value, 10);
  if (!stake || stake < 1) { showToast('Enter a valid stake'); return; }
  if (_participant && stake > _participant.coin_balance) { showToast('Not enough coins'); return; }

  const btn = document.getElementById('placeBetBtn');
  btn.disabled = true;
  btn.textContent = 'Placing…';

  try {
    let sfEligible = false;
    if (_parlayLegs.length === 1) {
      const leg = _parlayLegs[0];
      let oddsToUse = leg.odds;
      const boosted = _boostState.active;
      if (boosted) {
        oddsToUse = applyBoostCalc(leg.odds);
        _boostState.remaining--;
        _boostState.active = false;
        saveBoosts();
      }
      const bet = await placeBet(leg.marketId, _participant.id, leg.selection, stake, oddsToUse);
      sfEligible = _sfIsActive() && !boosted;
      if (sfEligible) {
        _sfPending = { id: bet.id, type: 'single' };
      } else {
        showToast(boosted ? 'Boosted bet placed! 🚀' : 'Bet placed! Good luck 🎰');
      }
    } else {
      if (_ppIsActive() && _parlayLegs.length >= 3 && _ppHasCustomLeg()) {
        showToast('nice try. on your bike you bastard');
        btn.disabled = false;
        btn.textContent = 'Place Bet';
        return;
      }
      const totalOdds = calcTotalOdds();
      const legs = _parlayLegs.map(l => ({
        market_id: l.marketId,
        selection: l.selection,
        odds:      l.odds,
      }));
      const parlay = await placeParlay(_participant.id, legs, stake, totalOdds);
      sfEligible = _sfIsActive();
      if (sfEligible) {
        _sfPending = { id: parlay.id, type: 'parlay' };
      } else {
        showToast(`Multi placed! ${_parlayLegs.length} legs — Good luck 🎰`);
      }
    }

    if (sfEligible) {
      openSundayFunday();
    } else {
      await _finishBetFlow();
    }
  } catch(err) {
    showToast(err.message || 'Failed to place bet');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Place Bet';
  }
}

async function _finishBetFlow() {
  closeBetSlip();
  const { data: fresh } = await db.from('participants').select('coin_balance').eq('id', _participant.id).single();
  if (fresh) {
    _participant.coin_balance = fresh.coin_balance;
    document.getElementById('balanceAmt').textContent = fresh.coin_balance.toLocaleString();
  }
}

const SPIN_PROMO_DATE = '2026-06-20';
const SPIN_SEGMENTS   = 6; // index 0 = WIN, 1-5 = LOSE

function _spinPromoKey() { return `wc26_spin_promo_${_participant?.id}`; }

function drawWheel(rotationRad) {
  const canvas = document.getElementById('spinCanvas');
  if (!canvas) return;
  const ctx    = canvas.getContext('2d');
  const cx     = canvas.width  / 2;
  const cy     = canvas.height / 2;
  const r      = cx - 4;
  const arc    = (2 * Math.PI) / SPIN_SEGMENTS;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const labels = ['WIN', 'No Luck', 'No Luck', 'No Luck', 'No Luck', 'No Luck'];
  const colors = ['#22c55e', '#2d3748', '#1f2937', '#2d3748', '#1f2937', '#2d3748'];

  for (let i = 0; i < SPIN_SEGMENTS; i++) {
    const start = rotationRad + i * arc - Math.PI / 2;
    const end   = start + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = i === 0 ? '#000' : '#9ca3af';
    ctx.font = `bold ${i === 0 ? 13 : 11}px 'DM Sans', sans-serif`;
    ctx.fillText(labels[i], r - 10, 4);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, 2 * Math.PI);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function maybeShowSpinPromo() {
  const today = new Date().toISOString().slice(0, 10);
  if (today !== SPIN_PROMO_DATE) return;
  const key = _spinPromoKey();
  if (localStorage.getItem(key)) return;
  drawWheel(0);
  document.getElementById('spinPromoOverlay').classList.remove('hidden');
}

function doSpin() {
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;

  const won      = Math.random() < (1 / 6);
  const arc      = (2 * Math.PI) / SPIN_SEGMENTS;
  // Pointer is at top (−π/2). Segment i centre angle = −π/2 + (i + 0.5) * arc.
  // We want segment i to stop at the top (pointer), so rotation R satisfies:
  //   R + i * arc + arc/2 ≡ 0  (mod 2π)  →  R = -(i * arc + arc/2)
  const targetSeg = won ? 0 : (1 + Math.floor(Math.random() * 5));
  const baseSpins = 5 * 2 * Math.PI;
  const targetRot = baseSpins + (-(targetSeg * arc + arc / 2));

  const duration  = 3200;
  const startTime = performance.now();
  let startRot    = 0;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function frame(now) {
    const elapsed = now - startTime;
    const t       = Math.min(elapsed / duration, 1);
    const current = startRot + easeOut(t) * (targetRot - startRot);
    drawWheel(current);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      showSpinResult(won);
    }
  }

  requestAnimationFrame(frame);
  localStorage.setItem(_spinPromoKey(), '1');
}

function showSpinResult(won) {
  const resultEl = document.getElementById('spinResult');
  const closeBtn = document.getElementById('spinCloseBtn');
  resultEl.classList.remove('hidden', 'spin-result--win', 'spin-result--lose');
  if (won) {
    _boostState.remaining++;
    saveBoosts();
    updateBoostUI();
    resultEl.classList.add('spin-result--win');
    resultEl.textContent = '🚀 You won an extra Odds Boost!';
  } else {
    resultEl.classList.add('spin-result--lose');
    resultEl.textContent = 'No luck this time — good luck on your bets!';
  }
  closeBtn.classList.remove('hidden');
}

function closeSpinPromo() {
  document.getElementById('spinPromoOverlay').classList.add('hidden');
}

// ─── Sunday Funday ────────────────────────────────────────────────────────────

let _sfPending = null; // { id, type: 'single'|'parlay' }

function _sfIsActive() {
  return _tuAESTNow().dow === 0;
}

function openSundayFunday() {
  const coin = document.getElementById('sfCoin');
  coin.textContent = '?';
  coin.className = 'tu-coin sf-coin';
  document.getElementById('sfChoice').querySelectorAll('button').forEach(b => b.disabled = false);
  document.getElementById('sfResult').classList.add('hidden');
  document.getElementById('sfCloseBtn').classList.add('hidden');
  document.getElementById('sfOverlay').classList.remove('hidden');
}

async function pickSundayFunday(choice) {
  document.getElementById('sfChoice').querySelectorAll('button').forEach(b => b.disabled = true);
  const coin = document.getElementById('sfCoin');
  coin.classList.add('tu-coin--spinning');

  setTimeout(async () => {
    const result = Math.random() < 0.5 ? 'heads' : 'tails';
    coin.textContent = result === 'heads' ? 'H' : 'T';
    coin.className = `tu-coin sf-coin ${result === 'heads' ? 'tu-coin-hh' : 'tu-coin-tt'}`;

    const resultEl = document.getElementById('sfResult');
    resultEl.classList.remove('hidden', 'spin-result--win', 'spin-result--lose');

    if (choice === result) {
      try {
        if (_sfPending.type === 'single') {
          await applySundayFundayBoost(_sfPending.id, _participant.id);
        } else {
          await applySundayFundayBoostParlay(_sfPending.id, _participant.id);
        }
        resultEl.classList.add('spin-result--win');
        resultEl.textContent = '🎉 Called it! +10% odds boost applied.';
      } catch (err) {
        resultEl.classList.add('spin-result--lose');
        resultEl.textContent = 'Called it, but the boost failed to apply.';
      }
    } else {
      resultEl.classList.add('spin-result--lose');
      resultEl.textContent = 'No luck this time — bet stands as placed.';
    }

    document.getElementById('sfCloseBtn').classList.remove('hidden');
  }, 800);
}

async function closeSundayFunday() {
  document.getElementById('sfOverlay').classList.add('hidden');
  document.getElementById('sfCoin').classList.remove('tu-coin--spinning');
  _sfPending = null;
  await _finishBetFlow();
}

// ─── Parlay Pump in-slip banner ──────────────────────────────────────────────

function _ppIsActive() {
  const { dow, hour } = _tuAESTNow();
  // Wed (dow=3) all day, or Thu (dow=4) before 06:00 AEST
  if (dow === 3 || (dow === 4 && hour < 6)) return true;
  // One-off window: LaddyLadLad, now → Sun 28 Jun 2026 07:00 AEST (= 27 Jun 21:00 UTC)
  if (_tournament && _tournament.id === '31e106b4-3264-4333-8817-ba268aff9e7a') {
    return Date.now() < Date.UTC(2026, 5, 27, 21, 0, 0);
  }
  return false;
}

function _ppHasCustomLeg() {
  return _parlayLegs.some(l => l.marketType === 'custom');
}

function updateParlayPumpSlip() {
  const el   = document.getElementById('ppSlipBanner');
  const peek = document.getElementById('ppSlipPeekBanner');
  const active = _ppIsActive();
  const n = _parlayLegs.length;

  const hasCustom = _ppHasCustomLeg();

  function applyState(node) {
    if (!node) return;
    if (!active || n === 0) { node.style.display = 'none'; return; }
    node.style.display = 'flex';
    if (hasCustom) {
      node.className = 'pp-slip-banner pp-slip-inactive';
      node.textContent = '⚡ PARLAY PUMP — custom bets not eligible';
    } else if (n >= 3) {
      node.className = 'pp-slip-banner pp-slip-active';
      node.textContent = '⚡ PARLAY PUMP +35% boost active!';
    } else {
      const need = 3 - n;
      node.className = 'pp-slip-banner pp-slip-inactive';
      node.textContent = `⚡ PARLAY PUMP +35% — add ${need} more leg${need > 1 ? 's' : ''} to unlock`;
    }
  }

  applyState(el);
  applyState(peek);
}

init();

  if (_currentTab !== 'markets') return;
  const slip = document.getElementById('betSlip');
