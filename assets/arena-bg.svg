<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" shape-rendering="crispEdges">
  <defs>
    <!-- Two-tone sand tile 16x16 -->
    <pattern id="sand" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="8" fill="#d4a84a"/>
      <rect y="8" width="16" height="8" fill="#c09440"/>
    </pattern>
    <!-- Stone wall tile 16x16 -->
    <pattern id="stone" x="0" y="0" width="32" height="16" patternUnits="userSpaceOnUse">
      <rect width="32" height="16" fill="#706050"/>
      <rect width="15" height="14" fill="#604840"/>
      <rect x="17" width="15" height="14" fill="#604840"/>
      <rect y="8" x="8" width="15" height="6" fill="#504030"/>
    </pattern>
    <!-- Pixel tree symbol -->
    <symbol id="tree" width="32" height="44">
      <!-- Trunk -->
      <rect x="12" y="32" width="8" height="12" fill="#6b3a2a"/>
      <!-- Canopy dark -->
      <rect x="4" y="8" width="24" height="24" fill="#1a5e1a"/>
      <!-- Canopy highlight -->
      <rect x="4" y="8" width="12" height="8" fill="#3cb04a"/>
      <!-- Shadow edge -->
      <rect x="24" y="24" width="4" height="8" fill="#0f3a0f"/>
      <!-- Ground shadow -->
      <rect x="8" y="44" width="16" height="2" fill="rgba(0,0,0,0.3)"/>
    </symbol>
    <!-- Radial vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
    </radialGradient>
    <!-- Top spotlight -->
    <radialGradient id="spotlight" cx="50%" cy="0%" r="60%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="rgba(255,150,50,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Sand base -->
  <rect width="960" height="600" fill="url(#sand)"/>

  <!-- Top stone wall strip -->
  <rect width="960" height="24" fill="url(#stone)"/>

  <!-- Bottom stone wall strip -->
  <rect y="576" width="960" height="24" fill="url(#stone)"/>

  <!-- Left tree column shadow -->
  <rect x="112" y="24" width="20" height="552" fill="rgba(0,0,0,0.18)"/>

  <!-- Right tree column shadow -->
  <rect x="828" y="24" width="20" height="552" fill="rgba(0,0,0,0.18)"/>

  <!-- Left tree column -->
  <use href="#tree" x="0"  y="24"/>
  <use href="#tree" x="32" y="24"/>
  <use href="#tree" x="64" y="24"/>
  <use href="#tree" x="96" y="24"/>
  <use href="#tree" x="0"  y="64"/>
  <use href="#tree" x="32" y="64"/>
  <use href="#tree" x="64" y="64"/>
  <use href="#tree" x="96" y="64"/>
