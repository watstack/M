name: Refresh betting odds

# GitHub Pages can't run the /api/markets serverless function, so odds were
# never written to Supabase (every price showed "TBC"). This job does that
# work on a schedule instead by scraping public odds (no API key required —
# see docs/ODDS_SCRAPE.md), refreshed every 4 hours.

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch: {}      # allow manual runs from the Actions tab

concurrency:
  group: refresh-odds
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/scrape-odds.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
