name: Refresh betting odds

# GitHub Pages can't run the /api/markets serverless function, so 1X2 odds were
# never written to Supabase (every price showed "TBC"). This job does that work
# on a daily schedule instead — odds only need a 24h refresh.

on:
  schedule:
    - cron: '15 6 * * *'   # 06:15 UTC daily
  workflow_dispatch: {}      # allow manual runs from the Actions tab

concurrency:
  group: refresh-odds
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/refresh-odds.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
