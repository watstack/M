name: Auto-settle finished matches

# Runs every 15 minutes. Syncs ESPN/FBD match results and settles any
# bet_markets for matches finished ≥ 3 hours ago, across all tournaments.
# Admin UI (/api/settle) remains available for manual overrides.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: auto-settle
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/auto-settle.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
