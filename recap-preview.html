<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Recap · Style Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --dark:   #140a18;
  --mid:    #211327;
  --panel:  #190d1f;
  --border: #3a1f3a;
  --text:   #f6ead8;
  --muted:  #b58aa0;
  --orange: #ff6a1f;
  --gold:   #ff9ad0;
  --red:    #ff3b5c;
  --px-grn: #3cb04a;
  --px-dk:  #1a5e1a;
  --px-sky: #6888c8;
  --px-snd: #e8c97a;
  --px-blk: #0a0808;
  --fp: 'Press Start 2P', monospace;
  --fd: 'Chakra Petch', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--px-blk);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;font-family:var(--fp);
  overflow:hidden;
}

/* ── OUTER FRAME ─────────────────────────────── */
#wrap{
  position:relative;
  width:min(640px,100vw);
  aspect-ratio:16/10;
  background:var(--dark);
  border:3px solid var(--border);
  box-shadow:0 0 50px rgba(255,106,31,.35),0 0 0 1px rgba(255,154,208,.08);
  overflow:hidden;
  image-rendering:pixelated;
}

/* ── STADIUM BG ──────────────────────────────── */
.sky{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,
    #06030d 0%,#0f0620 28%,#16093a 50%,
    #0b2e1a 62%,#145e1a 73%,#2a9432 100%);
}
/* pixel crowd dots */
.crowd{
  position:absolute;top:22%;left:0;right:0;height:22%;
  background:
    repeating-linear-gradient(90deg,
      rgba(255,106,31,.18) 0 3px, transparent 3px 6px,
      rgba(255,154,208,.12) 6px 9px, transparent 9px 12px),
    repeating-linear-gradient(to bottom,
      rgba(255,220,100,.08) 0 2px, transparent 2px 4px);
  image-rendering:pixelated;
}
/* stadium arc lights */
.lights{
  position:absolute;top:10%;left:0;right:0;height:14%;
  display:flex;justify-content:space-around;align-items:flex-end;
  padding:0 8%;
}
.lbeam{width:2px;height:100%;
  background:linear-gradient(to bottom,rgba(255,230,160,.35),transparent);}
/* pitch */
.pitch{
  position:absolute;bottom:0;left:0;right:0;height:40%;
}
.pitch::before{
  content:'';position:absolute;left:50%;top:0;bottom:0;
  width:2px;background:rgba(255,255,255,.18);transform:translateX(-50%);
}
.pcircle{
  position:absolute;left:50%;top:35%;
  width:66px;height:66px;
  border:2px solid rgba(255,255,255,.13);border-radius:50%;
  transform:translate(-50%,-50%);
}
/* pitch line glow */
.pitch::after{
  content:'';position:absolute;left:50%;top:0;
  width:1px;height:100%;
  background:rgba(255,255,255,.06);
  box-shadow:0 0 12px rgba(255,255,255,.15);
  transform:translateX(-50%);
}

/* ── HUD ─────────────────────────────────────── */
#hud{
  position:absolute;top:0;left:0;right:0;
  height:50px;
  background:rgba(10,8,8,.93);
  border-bottom:2px solid var(--border);
  display:flex;align-items:center;
  padding:0 8px;gap:6px;z-index:10;
}
.tname{
  font-size:5.5px;color:var(--text);white-space:nowrap;
  letter-spacing:.04em;min-width:52px;text-align:center;
  line-height:1.6;
}
.hp-wrap{
  flex:1;height:16px;
  background:#0a0808;border:1px solid #2a1a2a;
  position:relative;overflow:hidden;
}
.hp-fill{
  position:absolute;top:0;bottom:0;
  transition:width .4s ease-out;
}
.hp-fill.p1{right:0;}
.hp-fill.p2{left:0;}
.hp-stripe{
  position:absolute;inset:0;
  background:repeating-linear-gradient(-45deg,
    transparent,transparent 4px,rgba(0,0,0,.18) 4px,rgba(0,0,0,.18) 6px);
  pointer-events:none;
}
.hp-low{ filter:saturate(1.8) hue-rotate(-20deg); }
.timer-box{
  font-size:17px;color:var(--text);
  background:#0a0808;border:2px solid #3a1f3a;
  padding:4px 9px;min-width:44px;text-align:center;
  font-family:var(--fp);flex-shrink:0;
}
.timer-box.urgent{color:var(--red);}

/* ── SCORE ───────────────────────────────────── */
#score-row{
  position:absolute;top:53px;left:0;right:0;
  display:flex;justify-content:center;align-items:center;
  gap:14px;z-index:8;
}
.snum{
  font-size:20px;color:var(--text);
  text-shadow:2px 2px 0 var(--px-blk);
  transition:transform .1s,color .1s;
  min-width:26px;text-align:center;
}
.snum.pop{transform:scale(1.7);color:var(--orange);}
.sdash{font-size:11px;color:var(--muted);}

/* ── FIGHTER CANVAS ──────────────────────────── */
#fighter-canvas{
  position:absolute;
  bottom:36%;left:0;
  width:100%;height:180px;
  z-index:6;
  image-rendering:pixelated;
  pointer-events:none;
}

/* ── HIT FLASH ───────────────────────────────── */
#hit-flash{
  position:absolute;inset:0;background:#fff;
  opacity:0;pointer-events:none;z-index:20;
}
@keyframes flash{0%{opacity:.7;}100%{opacity:0;}}
#hit-flash.go{animation:flash .35s ease-out forwards;}

/* ── SCREEN SHAKE ────────────────────────────── */
@keyframes shake{
  0%  {transform:translate(0);}
  15% {transform:translate(-5px,3px);}
  30% {transform:translate(5px,-2px);}
  50% {transform:translate(-4px,4px);}
  70% {transform:translate(3px,-1px);}
  85% {transform:translate(-2px,2px);}
  100%{transform:translate(0);}
}
#wrap.go-shake{animation:shake .4s ease-out;}

/* ── ANNOUNCER ───────────────────────────────── */
#ann{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:22px;text-align:center;
  z-index:22;pointer-events:none;opacity:0;
  white-space:nowrap;text-shadow:3px 3px 0 rgba(0,0,0,.9);
}
@keyframes ann-pop{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.25) rotate(-6deg);}
  14% {opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(3deg);}
  24% {transform:translate(-50%,-50%) scale(1) rotate(0);}
  72% {opacity:1;}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1);}
}
#ann.go{animation:ann-pop 1.6s ease-out forwards;}

/* ── SCORER LABEL ────────────────────────────── */
#scorer-lbl{
  position:absolute;bottom:42%;left:50%;
  transform:translateX(-50%);
  font-size:8px;color:var(--px-snd);
  text-shadow:1px 1px 0 var(--px-blk);
  z-index:9;opacity:0;white-space:nowrap;pointer-events:none;
}
@keyframes scorer-rise{
  0%  {opacity:0;transform:translateX(-50%) translateY(6px);}
  18% {opacity:1;transform:translateX(-50%) translateY(0);}
  72% {opacity:1;}
  100%{opacity:0;transform:translateX(-50%) translateY(-8px);}
}
#scorer-lbl.go{animation:scorer-rise 1.9s ease-out forwards;}

/* ── VS SCREEN ───────────────────────────────── */
#vs-screen{
  position:absolute;inset:0;
  background:var(--px-blk);
  display:flex;align-items:center;justify-content:center;
  z-index:30;
}
.vs-side{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;padding:16px;
}
.vs-side.p1{transform:translateX(-130%);transition:transform .42s cubic-bezier(0.23,1,.32,1);}
.vs-side.p2{transform:translateX(130%); transition:transform .42s cubic-bezier(0.23,1,.32,1);}
.vs-flag{width:54px;height:36px;border:2px solid rgba(255,255,255,.28);border-radius:2px;}
.vs-tname{font-size:7px;color:var(--text);text-align:center;letter-spacing:.05em;}
.vs-sprite{width:80px;height:100px;image-rendering:pixelated;}
.vs-sprite.flip{transform:scaleX(-1);}
.vs-mid{
  display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;
}
.vs-big{
  font-size:30px;color:var(--orange);
  text-shadow:4px 4px 0 var(--red),7px 7px 0 rgba(0,0,0,.5);
  letter-spacing:.1em;
}
.vs-sub{font-size:5.5px;color:var(--muted);text-align:center;line-height:2.2;}

/* ── RESULT BANNER ───────────────────────────── */
#result{
  position:absolute;top:36%;left:0;right:0;
  text-align:center;font-size:26px;
  text-shadow:4px 4px 0 rgba(0,0,0,.85);
  z-index:22;opacity:0;pointer-events:none;
}
@keyframes result-slam{
  0%  {opacity:0;transform:scaleY(5) scaleX(.2);}
  14% {opacity:1;transform:scaleY(.75) scaleX(1.12);}
  24% {transform:scale(1);}
  78% {opacity:1;}
  100%{opacity:0;transform:scale(1.04);}
}
#result.go{animation:result-slam 2s ease-out forwards;}

/* ── PROGRESS BAR ────────────────────────────── */
#prog{
  position:absolute;bottom:0;left:0;
  height:3px;background:var(--orange);z-index:15;
  box-shadow:0 0 8px var(--orange);
  transition:width 10s linear;
}

/* ── PARTICLES ───────────────────────────────── */
.px{
  position:absolute;width:5px;height:5px;border-radius:50%;
  pointer-events:none;z-index:18;
}
@keyframes px-fly{
  0%  {opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:var(--t) scale(0);}
}

/* ── SKIP BTN ────────────────────────────────── */
#skip{
  position:absolute;bottom:10px;right:10px;
  font-family:var(--fp);font-size:7px;
  color:var(--text);
  background:linear-gradient(135deg,rgba(255,106,31,.18),rgba(255,59,92,.14));
  border:2px solid var(--orange);
  padding:10px 18px;
  cursor:pointer;z-index:25;letter-spacing:.05em;
  box-shadow:0 0 12px rgba(255,106,31,.25);
  transition:background .12s,box-shadow .12s,transform .08s;
}
#skip:hover{
  background:linear-gradient(135deg,rgba(255,106,31,.35),rgba(255,59,92,.28));
  box-shadow:0 0 22px rgba(255,106,31,.5);
  transform:scale(1.04);
}
#skip:active{transform:scale(.97);}

/* ── MATCH COUNTER ───────────────────────────── */
#mctr{
  position:absolute;bottom:11px;left:9px;
  font-size:5px;color:var(--muted);z-index:12;
}

/* ── TITLE ───────────────────────────────────── */
#titlbar{
  position:absolute;top:7px;left:50%;transform:translateX(-50%);
  font-size:5px;color:var(--muted);z-index:11;white-space:nowrap;
  letter-spacing:.07em;
}

/* ── END SCREEN ──────────────────────────────── */
#end{
  position:absolute;inset:0;background:var(--px-blk);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:22px;z-index:40;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
#end.show{opacity:1;pointer-events:auto;}
.end-h{font-size:14px;color:var(--orange);text-shadow:3px 3px 0 var(--red);}
.end-s{font-size:6.5px;color:var(--muted);text-align:center;line-height:2.4;}

/* ── PAGE LABEL ──────────────────────────────── */
#page-lbl{
  margin-top:10px;font-family:var(--fp);
  font-size:5px;color:#3a2a3a;
  text-align:center;letter-spacing:.06em;
}
</style>

<body>

<div id="wrap">

  <!-- BG -->
  <div class="sky"></div>
  <div class="lights">
    <div class="lbeam"></div><div class="lbeam"></div><div class="lbeam"></div>
    <div class="lbeam"></div><div class="lbeam"></div><div class="lbeam"></div>
  </div>
  <div class="crowd"></div>
  <div class="pitch"><div class="pcircle"></div></div>

  <!-- VS intro -->
  <div id="vs-screen">
    <div class="vs-side p1" id="vs-left">
      <img id="vs-sp1" src="assets/avatars/striker.svg" class="vs-sprite" alt="">
      <div class="vs-flag" id="vs-f1"></div>
      <div class="vs-tname" id="vs-n1">ENGLAND</div>
    </div>
    <div class="vs-mid">
      <div class="vs-big">VS</div>
      <div class="vs-sub" id="vs-sub">GROUP STAGE · JUNE 11</div>
    </div>
    <div class="vs-side p2" id="vs-right">
      <img id="vs-sp2" src="assets/avatars/captain.svg" class="vs-sprite flip" alt="">
      <div class="vs-flag" id="vs-f2"></div>
      <div class="vs-tname" id="vs-n2">FRANCE</div>
    </div>
  </div>

  <!-- End -->
  <div id="end">
    <div class="end-h">RECAP COMPLETE</div>
    <div class="end-s">ALL YESTERDAY'S RESULTS SHOWN</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="tname" id="hn1">ENGLAND</div>
    <div class="hp-wrap">
      <div class="hp-fill p1" id="hp1" style="width:100%"></div>
      <div class="hp-stripe"></div>
    </div>
    <div class="timer-box" id="tim">10</div>
    <div class="hp-wrap">
      <div class="hp-fill p2" id="hp2" style="width:100%"></div>
      <div class="hp-stripe"></div>
    </div>
    <div class="tname" id="hn2">FRANCE</div>
  </div>

  <div id="titlbar">DAILY RECAP · YESTERDAY'S BATTLES</div>

  <!-- Score -->
  <div id="score-row">
    <span class="snum" id="s1">0</span>
    <span class="sdash">—</span>
    <span class="snum" id="s2">0</span>
  </div>

  <!-- Articulated fighter canvas -->
  <canvas id="fighter-canvas"></canvas>

  <!-- Overlays -->
  <div id="ann"></div>
  <div id="scorer-lbl"></div>
  <div id="result"></div>
  <div id="hit-flash"></div>

  <!-- Progress -->
  <div id="prog" style="width:100%"></div>

  <!-- Controls -->
  <button id="skip" onclick="skipNow()">SKIP ▶▶</button>
  <div id="mctr">MATCH 1 / 4</div>

</div>

<div id="page-lbl">STYLE PREVIEW — CLICK SKIP TO ADVANCE MATCH</div>

<script>
// ── Match data ────────────────────────────────────
const MATCHES = [
  {
    home:{ name:'ENGLAND',     c1:'#003399', c2:'#CC0000' },
    away:{ name:'FRANCE',      c1:'#0055A4', c2:'#EF4135' },
    hs:2, as:1,
    goals:[
      {t:'home',sc:'KANE  23\''},
      {t:'away',sc:'MBAPPÉ  45\''},
      {t:'home',sc:'SAKA  78\''},
    ]
  },
  {
    home:{ name:'BRAZIL',      c1:'#009B3A', c2:'#FEDD00' },
    away:{ name:'ARGENTINA',   c1:'#5B9BD5', c2:'#B5D0EC' },
    hs:1, as:1,
    goals:[
      {t:'home',sc:'VINICIUS  31\''},
      {t:'away',sc:'MESSI  67\''},
    ]
  },
  {
    home:{ name:'GERMANY',     c1:'#222222', c2:'#CCCCCC' },
    away:{ name:'SPAIN',       c1:'#AA151B', c2:'#F1BF00' },
    hs:0, as:3,
    goals:[
      {t:'away',sc:'MORATA  12\''},
      {t:'away',sc:'YAMAL  55\''},
      {t:'away',sc:'OLMO  88\''},
    ]
  },
  {
    home:{ name:'PORTUGAL',    c1:'#006600', c2:'#FF3333' },
    away:{ name:'NETHERLANDS', c1:'#E8600C', c2:'#FFFFFF' },
    hs:2, as:0,
    goals:[
      {t:'home',sc:'RONALDO  34\''},
      {t:'home',sc:'LEÃO  71\''},
    ]
  }
];

// Avatar pairs per match for visual variety
const SPRITES = [
  ['assets/avatars/striker.svg',   'assets/avatars/captain.svg'],
  ['assets/avatars/winger.svg',    'assets/avatars/playmaker.svg'],
  ['assets/avatars/keeper.svg',    'assets/avatars/manager.svg'],
  ['assets/avatars/ultra.svg',     'assets/avatars/mascot.svg'],
];

// Avatar color palettes matching the pixel art SVGs
const AVATAR_COLORS = {
  striker:    { skin:'#c98a5c', hair:'#241a12', jersey:'#e8392f', shorts:'#ffffff', socks:'#ffffff', boots:'#ffffff' },
  captain:    { skin:'#c98a5c', hair:'#ecbb33', jersey:'#ecbb33', shorts:'#3a2c0a', socks:'#14121f', boots:'#14121f', special:'armband' },
  keeper:     { skin:'#d99a66', hair:'#3a2a18', jersey:'#f5d020', shorts:'#1a1a1f', socks:'#f5d020', boots:'#14121f', special:'gloves', gloveColor:'#1fc2a4' },
  playmaker:  { skin:'#f0c39a', hair:'#5a3a1c', jersey:'#2a6fdb', shorts:'#13294f', socks:'#ffffff', boots:'#14121f' },
  winger:     { skin:'#e0a877', hair:'#e8c86a', jersey:'#1f9d55', shorts:'#101014', socks:'#ffffff', boots:'#14121f' },
  manager:    { skin:'#c98a5c', hair:'#b8b8be', jersey:'#2b303c', shorts:'#2b303c', socks:'#2b303c', boots:'#14121f', special:'tie', tieColor:'#e8392f' },
  mascot:     { skin:'#f3b96e', hair:'#e07b1f', jersey:'#e8392f', shorts:'#ffffff', socks:'#e8392f', boots:'#14121f' },
  fan:        { skin:'#c98a5c', hair:'#1fc2a4', jersey:'#e8392f', shorts:'#ffffff', socks:'#e8392f', boots:'#14121f' },
  ultra:      { skin:'#e0a877', hair:'#e8c86a', jersey:'#1f9d55', shorts:'#101014', socks:'#ffffff', boots:'#14121f' },
  commentator:{ skin:'#c98a5c', hair:'#3a2a18', jersey:'#2a2e38', shorts:'#2a2e38', socks:'#2a2e38', boots:'#14121f', special:'earpiece', earColor:'#25d8d8' },
};

// ── State ─────────────────────────────────────────
let gen = 0;
let curIdx = 0;
let tickId = null;
let timerVal = 10;

function e(id){ return document.getElementById(id); }

// ── Boot ──────────────────────────────────────────
window.addEventListener('load', () => setTimeout(() => runMatch(0), 200));

// ── Load a match ──────────────────────────────────
function runMatch(idx){
  gen++;                          // cancel all previous pending timeouts
  if(tickId) clearInterval(tickId);

  if(idx >= MATCHES.length){ showEnd(); return; }
  curIdx = idx;

  const m = MATCHES[idx];
  const sp = SPRITES[idx % SPRITES.length];
  const myGen = gen;

  // VS screen sprites
  e('vs-sp1').src = sp[0]; e('vs-sp2').src = sp[1];

  // HUD
  e('hn1').textContent = m.home.name;
  e('hn2').textContent = m.away.name;
  setHP(1, 100, m);
  setHP(2, 100, m);

  // Score reset
  e('s1').textContent = '0'; e('s2').textContent = '0';
  e('s1').classList.remove('pop'); e('s2').classList.remove('pop');

  // Timer
  timerVal = 10;
  e('tim').textContent = '10';
  e('tim').classList.remove('urgent');

  // Reset fighters
  resetFighters(m);

  // Progress bar
  e('prog').style.transition = 'none';
  e('prog').style.width = '100%';

  // Counter
  e('mctr').textContent = `MATCH ${idx+1} / ${MATCHES.length}`;

  // VS intro → battle
  vsIntro(m, sp, myGen, () => {
    if(gen !== myGen) return;
    startBattle(m, myGen);
  });
}

// ── VS Intro ──────────────────────────────────────
function vsIntro(m, sp, myGen, cb){
  const vs = e('vs-screen');
  const left = e('vs-left');
  const right = e('vs-right');

  e('vs-n1').textContent = m.home.name;
  e('vs-n2').textContent = m.away.name;
  e('vs-f1').style.background = m.home.c1;
  e('vs-f2').style.background = m.away.c1;

  // Reset off-screen
  left.style.transition = 'none'; right.style.transition = 'none';
  left.style.transform = 'translateX(-130%)';
  right.style.transform = 'translateX(130%)';
  vs.style.opacity = '1'; vs.style.transition = '';

  // Slide in
  raf2(() => {
    left.style.transition = 'transform .42s cubic-bezier(0.23,1,.32,1)';
    right.style.transition = 'transform .42s cubic-bezier(0.23,1,.32,1)';
    left.style.transform = 'translateX(0)';
    right.style.transform = 'translateX(0)';
  });

  // Slam together at ~1.1s
  after(1100, myGen, () => {
    left.style.transition = 'transform .1s ease-in';
    right.style.transition = 'transform .1s ease-in';
    left.style.transform = 'translateX(22px)';
    right.style.transform = 'translateX(-22px)';
    doFlash(); doShake();
  });

  // Fade out VS at 1.4s
  after(1400, myGen, () => {
    vs.style.transition = 'opacity .3s ease-out';
    vs.style.opacity = '0';
    after(330, myGen, cb);
  });
}

// ── Battle ────────────────────────────────────────
function startBattle(m, myGen){
  F.p1.setState('idle'); F.p2.setState('idle');
  announce('⚽  KICK OFF!', '#ff9ad0', myGen);

  // Spread goals between t=1.5s and t=7.2s
  const G = m.goals, n = G.length;
  const t0 = 1500, t1 = 7200;
  const step = n <= 1 ? 0 : (t1 - t0) / (n - 1);

  let hs = 0, as = 0;
  G.forEach((g, i) => {
    after(t0 + i * step, myGen, () => {
      if(g.t === 'home'){ hs++; fireGoal('p1', hs, as, m, g.sc, myGen); }
      else              { as++; fireGoal('p2', hs, as, m, g.sc, myGen); }
    });
  });

  // Result at 8.1s
  after(8100, myGen, () => showResult(m));

  // Next at 10s
  after(10000, myGen, fadeNext);

  // Countdown tick
  tickId = setInterval(() => {
    timerVal--;
    const v = Math.max(0, timerVal);
    e('tim').textContent = v;
    if(v <= 3) e('tim').classList.add('urgent');
    if(v <= 0) clearInterval(tickId);
  }, 1000);

  // Shrink progress bar
  raf2(() => {
    e('prog').style.transition = 'width 10s linear';
    e('prog').style.width = '0%';
  });
}

// ── Fight sequences ─────────────────────────────────
const FIGHT_SEQS = [
  { atk:'kick',      atkX:0.36, defX:0.62, def:'hurt'    },
  { atk:'punch',     atkX:0.38, defX:0.58, def:'stumble' },
  { atk:'high_kick', atkX:0.34, defX:0.60, def:'hurt'    },
  { atk:'uppercut',  atkX:0.35, defX:0.57, def:'hurt'    },
  { atk:'jump_kick', atkX:0.42, defX:0.60, def:'hurt',    jump:true },
  { atk:'punch',     atkX:0.16, defX:0.84, def:'duck',    noWalk:true, defNoWalk:true },
  { atk:'low_kick',  atkX:0.36, defX:0.62, def:'block'   },
  { atk:'high_kick', atkX:0.38, defX:0.60, def:'duck'    },
];

// ── Goal ──────────────────────────────────────────
function fireGoal(side, hs, as, m, scorer, myGen){
  const atk = F[side], def = F[side === 'p1' ? 'p2' : 'p1'];
  const W = document.getElementById('fighter-canvas').clientWidth;
  const seq = FIGHT_SEQS[(hs + as - 1) % FIGHT_SEQS.length];

  // Mirror positions for P2 attacking from right
  const atkPos = side === 'p1' ? seq.atkX * W : W - seq.atkX * W;
  const defPos = side === 'p1' ? seq.defX * W : W - seq.defX * W;

  // Attacker
  if(seq.jump){
    atk.setState(seq.atk, { onComplete: () => {
      after(500, myGen, () => { atk.walkTo(atk.homeX, 400); atk.setState('walk'); });
      after(900, myGen, () => atk.setState('idle'));
    }});
    atk.jumpTo(atkPos, -55, 350);
  } else if(!seq.noWalk){
    atk.setState('walk');
    atk.walkTo(atkPos, 400, () => {
      atk.setState(seq.atk, { onComplete: () => {
        after(500, myGen, () => { atk.walkTo(atk.homeX, 400); atk.setState('walk'); });
        after(900, myGen, () => atk.setState('idle'));
      }});
    });
  } else {
    atk.setState(seq.atk, { onComplete: () => {
      after(700, myGen, () => atk.setState('idle'));
    }});
  }

  // Defender
  if(!seq.defNoWalk){
    def.setState('walk');
    def.walkTo(defPos, 400, () => {
      after(150, myGen, () => {
        def.setState(seq.def, { onComplete: () => {
          after(350, myGen, () => { def.walkTo(def.homeX, 400); def.setState('walk'); });
          after(750, myGen, () => def.setState('idle'));
        }});
      });
    });
  } else {
    after(300, myGen, () => {
      def.setState(seq.def, { onComplete: () => {
        after(500, myGen, () => def.setState('idle'));
      }});
    });
  }

  doFlash(); doShake();

  after(200, myGen, () => {
    e('s1').textContent = hs; e('s2').textContent = as;
    const sid = side === 'p1' ? 's1' : 's2';
    e(sid).classList.add('pop');
    after(220, myGen, () => e(sid).classList.remove('pop'));
  });

  const mx = Math.max(m.hs, m.as, 1);
  setHP(1, Math.max(8, 100 - (as / mx) * 88), m);
  setHP(2, Math.max(8, 100 - (hs / mx) * 88), m);

  announce('⚽  GOAL!', '#3cb04a', myGen);
  popScorer(scorer);

  burst(side === 'p1' ? 22 : 78, side === 'p1' ? m.home.c2 : m.away.c2, 12);
}

// ── Result ────────────────────────────────────────
function showResult(m){
  const r = e('result');
  let text, color;

  if(m.hs > m.as){
    text  = m.home.name + '  WIN!';
    color = m.home.c2;
    F.p1.setState('win'); F.p2.setState('die');
    burst(22, m.home.c2, 22);
  } else if(m.as > m.hs){
    text  = m.away.name + '  WIN!';
    color = m.away.c2;
    F.p2.setState('win'); F.p1.setState('die');
    burst(78, m.away.c2, 22);
  } else {
    text  = 'IT\'S  A  DRAW!';
    color = '#ff9ad0';
    F.p1.setState('win'); F.p2.setState('win');
  }

  r.textContent = text;
  r.style.color = color;
  r.classList.remove('go'); r.offsetHeight; r.classList.add('go');
}

// ── Transition ────────────────────────────────────
function fadeNext(){
  clearInterval(tickId);
  const w = e('wrap');
  w.style.transition = 'opacity .38s';
  w.style.opacity = '0';
  setTimeout(() => {
    w.style.opacity = '1';
    runMatch(curIdx + 1);
  }, 400);
}

function skipNow(){
  gen++;                    // invalidate all pending after() calls
  clearInterval(tickId);
  fadeNext();
}

function showEnd(){
  e('end').classList.add('show');
}

// ── Helpers ───────────────────────────────────────
function setHP(n, pct, m){
  const el = e('hp' + n);
  const m2 = n === 1 ? m.home : m.away;
  el.style.width = pct + '%';
  el.style.background = n === 1
    ? `linear-gradient(to left, ${m2.c1}, ${m2.c2})`
    : `linear-gradient(to right, ${m2.c1}, ${m2.c2})`;
  el.classList.toggle('hp-low', pct < 30);
}

function announce(txt, col, myGen){
  const a = e('ann');
  a.textContent = txt; a.style.color = col;
  a.classList.remove('go'); a.offsetHeight; a.classList.add('go');
}

function popScorer(txt){
  const l = e('scorer-lbl');
  l.textContent = txt;
  l.classList.remove('go'); l.offsetHeight; l.classList.add('go');
}

function doFlash(){
  const f = e('hit-flash');
  f.classList.remove('go'); f.offsetHeight; f.classList.add('go');
}

function doShake(){
  const w = e('wrap');
  w.classList.remove('go-shake'); w.offsetHeight; w.classList.add('go-shake');
}


function burst(xPct, color, n){
  const w = e('wrap');
  for(let i = 0; i < n; i++){
    const p = document.createElement('div');
    p.className = 'px';
    p.style.background = color;
    p.style.left = (xPct + (Math.random()-.5)*14) + '%';
    p.style.top  = (30 + Math.random()*28) + '%';
    const dx = (Math.random()-.5)*110;
    const dy = -(Math.random()*90 + 25);
    p.style.setProperty('--t', `translate(${dx}px,${dy}px)`);
    p.style.animation = `px-fly ${.45 + Math.random()*.55}s ease-out forwards`;
    w.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

// after() respects the generation counter — noop if gen changed
function after(ms, myGen, fn){
  setTimeout(() => { if(gen === myGen) fn(); }, ms);
}

// double-rAF to guarantee style commit before transition
function raf2(fn){ requestAnimationFrame(() => requestAnimationFrame(fn)); }

      { t:0.35, bodyY:-5,  torsoTilt:-0.18, headTilt:-0.18,
        rUA:0.6,  rFA:0.9,  lUA:-0.55, lFA:-0.9,
        rTH:0.05, rSH:0.35, lTH:-0.05, lSH:0.15 },
      { t:0.55, bodyY:0,  torsoTilt:0.06, headTilt:0,
        rUA:0.45, rFA:1.15, lUA:-0.45, lFA:-1.15,
        rTH:0.12, rSH:0.25, lTH:-0.12, lSH:0 },
    ]
  },
  win: {
    dur: 0.75, loop: true,
    kf: [
      { t:0,   bodyY:0,   torsoTilt:-0.05, headTilt:-0.1,
        rUA:-1.0, rFA:-0.5, lUA:1.0, lFA:0.5,
        rTH:0.05, rSH:0, lTH:-0.05, lSH:0 },
      { t:0.5, bodyY:-12, torsoTilt:-0.08, headTilt:-0.15,
        rUA:-1.25, rFA:-0.3, lUA:1.25, lFA:0.3,
        rTH:0.05, rSH:0, lTH:-0.05, lSH:0 },
      { t:1,   bodyY:0,   torsoTilt:-0.05, headTilt:-0.1,
        rUA:-1.0, rFA:-0.5, lUA:1.0, lFA:0.5,
        rTH:0.05, rSH:0, lTH:-0.05, lSH:0 },
    ]
  },
  die: {
    dur: 0.55, loop: false,
    kf: [
      { t:0,    bodyY:0,   torsoTilt:0.06, headTilt:0, bodyRot:0,
        rUA:0.45, rFA:1.15, lUA:-0.45, lFA:-1.15,
        rTH:0.12, rSH:0.25, lTH:-0.12, lSH:0 },
      { t:0.2,  bodyY:-8, torsoTilt:0.3, headTilt:0.2, bodyRot:0.3,
        rUA:0.8,  rFA:0.6, lUA:-0.5, lFA:-0.5,
        rTH:0.6,  rSH:0.9, lTH:-0.3, lSH:0.4 },
      { t:0.45, bodyY:-60, torsoTilt:1.2, headTilt:0.3, bodyRot:1.3,
        rUA:0.8, rFA:0.6, lUA:-0.5, lFA:-0.5,
        rTH:1.1, rSH:1.4, lTH:0.9, lSH:0.8 },
      { t:0.55, bodyY:-70, torsoTilt:1.57, headTilt:0.3, bodyRot:1.57,
        rUA:0.8, rFA:0.6, lUA:-0.5, lFA:-0.5,
        rTH:1.2, rSH:1.5, lTH:1.0, lSH:0.9 },
    ]
  },
};

// ── Lerp helpers ──────────────────────────────────
function lerp(a, b, t){ return a + (b - a) * t; }
function easeInOut(t){ return t < .5 ? 2*t*t : -1+(4-2*t)*t; }

function lerpPose(a, b, t){
  const r = {};
  for(const k in a) r[k] = lerp(a[k] || 0, b[k] || 0, t);
  return r;
}

function samplePose(anim, t){
  const kf = anim.kf;
  // t is 0..1 normalized progress
  for(let i = 0; i < kf.length - 1; i++){
    if(t >= kf[i].t && t <= kf[i+1].t){
      const span = kf[i+1].t - kf[i].t;
      const local = span === 0 ? 0 : (t - kf[i].t) / span;
      return lerpPose(kf[i], kf[i+1], easeInOut(local));
    }
  }
  return { ...kf[kf.length - 1] };
}

// ── Fighter class ─────────────────────────────────
class Fighter {
  constructor({ facing, homeX, floorY, colors }){
    this.facing  = facing;
    this.homeX   = homeX;
    this.floorY  = floorY;
    this.colors  = colors;
    this.x       = homeX;
    this.animName = 'idle';
    this.anim    = POSES.idle;
    this.animT   = 0;
    this.pose    = samplePose(this.anim, 0);
    this.opacity = 1;
    this._walkFrom = homeX;
    this._walkTo   = homeX;
    this._walkDur  = 0;
    this._walkT    = 1;
    this._walkCb   = null;
    this._onComplete = null;
    this._jumpActive = false;
    this._jumpPeak   = 0;
    this._jumpDur    = 0;
    this._jumpT      = 1;
    this._jumpOffset = 0;
    this._jumpCb     = null;
  }

  setState(name, { onComplete } = {}){
    const a = POSES[name];
    if(!a) return;
    this.animName = name;
    this.anim    = a;
    this.animT   = 0;
    this._onComplete = onComplete || null;
    if(name !== 'die') this.opacity = 1;
  }

  walkTo(tx, ms, cb){
    this._walkFrom = this.x;
    this._walkTo   = tx;
    this._walkDur  = ms / 1000;
    this._walkT    = 0;
    this._walkCb   = cb || null;
  }

  jumpTo(tx, peakY, ms, cb){
    this._jumpPeak   = peakY;
    this._jumpDur    = ms / 1000;
    this._jumpT      = 0;
    this._jumpOffset = 0;
    this._jumpActive = true;
    this._jumpCb     = cb || null;
    this.walkTo(tx, ms);
  }

  update(dt){
    // Walk
    if(this._walkT < 1){
      this._walkT = Math.min(1, this._walkT + dt / this._walkDur);
      this.x = lerp(this._walkFrom, this._walkTo, easeInOut(this._walkT));
      if(this._walkT >= 1 && this._walkCb){ const cb = this._walkCb; this._walkCb = null; cb(); }
    }

    // Jump arc
    if(this._jumpActive){
      this._jumpT = Math.min(1, this._jumpT + dt / this._jumpDur);
      this._jumpOffset = this._jumpPeak * 4 * this._jumpT * (1 - this._jumpT);
      if(this._jumpT >= 1){
        this._jumpActive = false;
        this._jumpOffset = 0;
        if(this._jumpCb){ const cb = this._jumpCb; this._jumpCb = null; cb(); }
      }
    }

    // Animation
    const prevT = this.animT;
    this.animT += dt / this.anim.dur;

    if(this.anim.loop){
      this.animT %= 1;
    } else {
      if(this.animT >= 1){
        this.animT = 1;
        if(this.animName === 'die') this.opacity = 0.35;
        if(this._onComplete && prevT < 1){ const cb = this._onComplete; this._onComplete = null; cb(); }
      }
    }

    this.pose = samplePose(this.anim, this.animT);
  }

  draw(ctx){
    const p  = this.pose;
    const cx = this.x;
    const cy = this.floorY;
    const f  = this.facing;
    const C  = this.colors;

    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.translate(cx, cy);
    ctx.scale(f, 1);  // mirror for p2

    // Body rotation (for die)
    const bRot = p.bodyRot || 0;
    if(bRot !== 0){
      ctx.translate(0, -(SK.HIP_Y));
      ctx.rotate(bRot);
      ctx.translate(0, SK.HIP_Y);
    }

    const bodyY = (p.bodyY || 0) + this._jumpOffset;

    // Shadow
    ctx.save();
    ctx.globalAlpha = (this.opacity * 0.45);
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 2, SK.THIGH_W * 1.6, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // ── back leg (thigh + shin + boot)
    this._drawLeg(ctx, SK.HIP_Y - bodyY, p.lTH, p.lSH, C.shorts, C.socks, C.boots);

    // Back arm
    this._drawArm(ctx, SK.SHOULDER_Y - bodyY, p.lUA, p.lFA, C.jersey, C.skin, true);

    // Torso
    ctx.save();
    ctx.translate(0, -(SK.HIP_Y - bodyY));
    ctx.rotate(p.torsoTilt || 0);
    // shorts
    ctx.fillStyle = C.shorts;
    ctx.strokeStyle = darken(C.shorts, 0.6);
    ctx.lineWidth = 1;
    ctx.fillRect(-SK.TORSO_W/2, -SK.TORSO_H*0.28, SK.TORSO_W, SK.TORSO_H*0.28);
    ctx.strokeRect(-SK.TORSO_W/2, -SK.TORSO_H*0.28, SK.TORSO_W, SK.TORSO_H*0.28);
    // jersey
    ctx.fillStyle = C.jersey;
    ctx.strokeStyle = darken(C.jersey, 0.6);
    ctx.fillRect(-SK.TORSO_W/2, -SK.TORSO_H, SK.TORSO_W, SK.TORSO_H*0.72);
    ctx.strokeRect(-SK.TORSO_W/2, -SK.TORSO_H, SK.TORSO_W, SK.TORSO_H*0.72);
    // accent stripe
    if(C.accent){
      ctx.fillStyle = C.accent;
      ctx.fillRect(-SK.TORSO_W/2, -SK.TORSO_H, SK.TORSO_W, SK.TORSO_H*0.12);
    }
    // tie (manager)
    if(C.special === 'tie'){
      ctx.fillStyle = C.tieColor;
      ctx.fillRect(-2, -SK.TORSO_H*0.9, 4, SK.TORSO_H*0.65);
    }
    ctx.restore();

    // ── front leg
    this._drawLeg(ctx, SK.HIP_Y - bodyY, p.rTH, p.rSH, C.shorts, C.socks, C.boots);

    // Front arm
    this._drawArm(ctx, SK.SHOULDER_Y - bodyY, p.rUA, p.rFA, C.jersey, C.skin, false);

    // Head
    ctx.save();
    ctx.translate(0, -(SK.NECK_Y - bodyY + SK.TORSO_H * (p.torsoTilt||0) * 0.5));
    ctx.rotate((p.torsoTilt||0) * 0.5 + (p.headTilt||0));
    // earpiece (commentator)
    if(C.special === 'earpiece'){
      ctx.fillStyle = C.earColor;
      ctx.fillRect(SK.HEAD_W/2 - 1, -SK.HEAD_H*0.55, 3, 3);
    }
    // hair
    ctx.fillStyle = C.hair;
    ctx.fillRect(-SK.HEAD_W/2, -SK.HEAD_H - SK.HEAD_H*0.15, SK.HEAD_W, SK.HEAD_H*0.25);
    // face
    ctx.fillStyle = C.skin;
    ctx.strokeStyle = darken(C.skin, 0.6);
    ctx.lineWidth = 1;
    ctx.fillRect(-SK.HEAD_W/2, -SK.HEAD_H, SK.HEAD_W, SK.HEAD_H);
    ctx.strokeRect(-SK.HEAD_W/2, -SK.HEAD_H, SK.HEAD_W, SK.HEAD_H);
    // eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(SK.HEAD_W*0.15, -SK.HEAD_H*0.65, SK.HEAD_W*0.22, SK.HEAD_H*0.18);
    ctx.fillRect(-SK.HEAD_W*0.38, -SK.HEAD_H*0.65, SK.HEAD_W*0.22, SK.HEAD_H*0.18);
    ctx.fillStyle = '#1a0a14';
    ctx.fillRect(SK.HEAD_W*0.22, -SK.HEAD_H*0.65, SK.HEAD_W*0.1, SK.HEAD_H*0.15);
    ctx.fillRect(-SK.HEAD_W*0.30, -SK.HEAD_H*0.65, SK.HEAD_W*0.1, SK.HEAD_H*0.15);
    ctx.restore();

    ctx.restore();
  }

  _drawLeg(ctx, pivotY, thighAngle, shinAngle, shortColor, sockColor, bootColor){
    ctx.save();
    ctx.translate(0, -pivotY);
    ctx.rotate(thighAngle);
    // thigh
    ctx.fillStyle = shortColor;
    ctx.strokeStyle = darken(shortColor, 0.6);
    ctx.lineWidth = 1;
    ctx.fillRect(-SK.THIGH_W/2, 0, SK.THIGH_W, SK.THIGH_L);
    ctx.strokeRect(-SK.THIGH_W/2, 0, SK.THIGH_W, SK.THIGH_L);
    // shin
    ctx.translate(0, SK.THIGH_L);
    ctx.rotate(shinAngle);
    ctx.fillStyle = sockColor;
    ctx.strokeStyle = darken(sockColor, 0.55);
    ctx.fillRect(-SK.SHIN_W/2, 0, SK.SHIN_W, SK.SHIN_L);
    ctx.strokeRect(-SK.SHIN_W/2, 0, SK.SHIN_W, SK.SHIN_L);
    // boot
    ctx.translate(0, SK.SHIN_L);
    ctx.fillStyle = bootColor;
    ctx.strokeStyle = '#000';
    ctx.fillRect(-SK.BOOT_W/2, 0, SK.BOOT_W, SK.BOOT_H);
    ctx.strokeRect(-SK.BOOT_W/2, 0, SK.BOOT_W, SK.BOOT_H);
    ctx.restore();
  }

  _drawArm(ctx, pivotY, upperAngle, foreAngle, jerseyColor, skinColor, isBack){
    ctx.save();
    ctx.translate(0, -pivotY);
    ctx.rotate(upperAngle);
    ctx.fillStyle = jerseyColor;
    ctx.strokeStyle = darken(jerseyColor, 0.6);
    ctx.lineWidth = 1;
    ctx.fillRect(-SK.UARM_W/2, 0, SK.UARM_W, SK.UARM_L);
    ctx.strokeRect(-SK.UARM_W/2, 0, SK.UARM_W, SK.UARM_L);
    ctx.translate(0, SK.UARM_L);
    ctx.rotate(foreAngle);
    ctx.fillStyle = skinColor;
    ctx.strokeStyle = darken(skinColor, 0.6);
    ctx.fillRect(-SK.FARM_W/2, 0, SK.FARM_W, SK.FARM_L);
    ctx.strokeRect(-SK.FARM_W/2, 0, SK.FARM_W, SK.FARM_L);
    // armband on front forearm (captain)
    if(!isBack && this.colors.special === 'armband'){
      ctx.fillStyle = '#e8392f';
      ctx.fillRect(-SK.FARM_W/2 - 1, SK.FARM_L * 0.35, SK.FARM_W + 2, 3);
    }
    ctx.translate(0, SK.FARM_L);
    const fistC = (!isBack && this.colors.special === 'gloves') ? this.colors.gloveColor : skinColor;
    ctx.fillStyle = fistC;
    ctx.fillRect(-SK.FIST_W/2, 0, SK.FIST_W, SK.FIST_H);
    ctx.strokeRect(-SK.FIST_W/2, 0, SK.FIST_W, SK.FIST_H);
    ctx.restore();
  }
}

// ── Color helper ──────────────────────────────────
function darken(hex, f){
  hex = hex.replace('#','');
  if(hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const r = Math.round(parseInt(hex.slice(0,2),16)*f);
  const g = Math.round(parseInt(hex.slice(2,4),16)*f);
  const b = Math.round(parseInt(hex.slice(4,6),16)*f);
  return `rgb(${r},${g},${b})`;
}

// ── Fighter state ─────────────────────────────────
const F = { p1: null, p2: null };
let _rafId = null, _lastT = 0;

function resetFighters(m){
  const cvs = document.getElementById('fighter-canvas');
  const W = cvs.clientWidth, H = 180;
  cvs.width = W; cvs.height = H;

  const sp = SPRITES[curIdx % SPRITES.length];
  const av1 = sp[0].replace('assets/avatars/','').replace('.svg','');
  const av2 = sp[1].replace('assets/avatars/','').replace('.svg','');
  const ac1 = AVATAR_COLORS[av1] || AVATAR_COLORS.striker;
  const ac2 = AVATAR_COLORS[av2] || AVATAR_COLORS.captain;

  F.p1 = new Fighter({
    facing: 1, homeX: W * 0.16, floorY: H - 10,
    colors: { ...ac1, accent: m.home.c2 }
  });
  F.p2 = new Fighter({
    facing: -1, homeX: W * 0.84, floorY: H - 10,
    colors: { ...ac2, accent: m.away.c2 }
  });

  if(!_rafId) _rafId = requestAnimationFrame(_rafLoop);
}

function _rafLoop(now){
  const dt = Math.min((now - (_lastT||now)) / 1000, 0.05);
  _lastT = now;
  const cvs = document.getElementById('fighter-canvas');
  if(!cvs){ _rafId = requestAnimationFrame(_rafLoop); return; }
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  if(F.p1){ F.p1.update(dt); F.p1.draw(ctx); }
  if(F.p2){ F.p2.update(dt); F.p2.draw(ctx); }
  _rafId = requestAnimationFrame(_rafLoop);
}
